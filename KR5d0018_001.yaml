front:
  text: 周易參同契卷中下同卷容二
  hash: sha256:96d1e0ff15751f807f49dafbac6548926c4a0cf7abcd2ee6dc8d86d9c2050b43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0018_HFL_001-001a, image: hfl/0623/0623-046.png}
body:
  text: 廬陵後學黃瑞節附録中篇乾剛坤柔配合相包陽稟陰受雄雌相須須以造化精氣乃舒坎離冠首光耀垂敷玄冥難測不可畫圖聖人揆度參序玄基四者混沌徑入虛無六十卦周張布為輿龍馬就駕明君御時和則隨從路平不邪邪道險阻傾危國家此與上篇首章相表裏君子居其室出其言善則千里之外應之謂萬乘之主處九重之室發號出令順陰陽節藏器俟時勿違卦日屯以子申蒙用寅戌餘六十卦各自有日聊陳兩象未能究悉立義設刑當仁施德逆之者凶順之者吉按歷法令至誠專密謹候日辰審察消息纖芥不正悔吝為賊二至改度乖錯委曲隆冬大暑盛夏霰雪二分縱橫不應漏刻風雨不節水旱相伐蝗蟲涌沸山崩地裂天見其怪群異旁出孝子用心感動皇極近起己口遠流殊域或以招禍或以致福或興太平或造兵革四者之來由乎胸臆動靜有常奉其繩墨四時順宜與氣相得剛柔斷矣不相涉入五行守界不妄盈縮易行周流屈伸反覆此與上篇論屯蒙朝暮內體外用相表裏蓋乾納甲壬坤納乙癸震庚巽辛坎戊離己艮丙兊丁也重卦之法乾下三爻納甲子寅辰上三爻納壬午申戌坤下三爻納乙未巳卯上三爻納癸丑亥酉震下三爻納庚子寅辰上三爻納庚午申戌巽下三爻納辛丑亥酉上三爻納辛未巳卯坎下三爻納戊寅辰午上三爻納戊申戌子離下三爻納己卯丑亥上三爻納己酉未巳艮下三爻納丙辰午申上三爻納丙戌子寅兊下三爻納丁巳卯丑上三爻納丁亥酉未而內體從子至辰巳外用從午訖戌亥故朝屯則初九庚子之爻當子時六四戊申之爻當卯時暮蒙則初六戊寅之爻當午時六四戊戌之爻當酉時餘六十卦各以此法推之此再言一日之火候也晦朔之間合符行中渾沌鴻濛牝牡相從滋液潤澤施化流通天地神靈不可度量利用安身隱形而藏始乎東北箕斗之鄉旋而右轉嘔輪吐萌潛潭見象發散精光畢昴之上震出為徵陽氣造端初九潛龍陽以三立陰以八通故三日震動八日兊行九二見龍和平有明三五德就乾體乃成九三夕惕虧折神符盛衰漸革終還其初巽繼其統固濟操持九四或躍進退道危艮主進止不得踰時二十三日典守弦期九五飛龍天位加喜六五坤承結括終始藴養衆子世為類母陽數已訖訖則復起推情合性轉而相與上九亢龍戰德於野用九翩翩為道規矩循據璇璣升降上下周流六爻難得察睹故無常位為易宗祖此再以納甲言一月之火候也又以乾六爻納於其間以明陽氣之消息箕斗但言東北畢昴但言正西借天之四方以言地之四方耳非謂天之東北西方也六五恐是草六字草音入即二十字二十六日以候坤卦用事也用九以下與上篇乾坤二用處相表裏朔旦為復陽氣始通出入無疾立表微剛黃鍾建子兆乃滋彰播施柔暖黎蒸得常臨爐施條開路正光光耀寖進日以益長丑之大吕結正低昂仰以成泰剛柔並隆陰陽交接小往大來輻湊於寅運而趨時漸歷大壯俠列卯門榆莢墮落還歸本根刑德相負晝夜始分夬陰以退陽升而前洗濯羽翮振索宿塵乾健盛明廣被四鄰陽終於己中而相干姤始紀緒履霜最先井底寒泉午為蕤賔賔服於陰陰為主人遁去世位收斂其精懷德俟時棲遲昧冥否閉不通萌者不生陰伸陽詘沒陽姓名觀其權量察仲秋情任蓄微稚老枯復榮薺麥芽蘖因冒以生剝爛支體消滅其形化氣既竭亡失至神道窮則反歸乎坤元恆順地理承天布宣玄幽遠眇隔閡相連應度育種陰陽之原寥廓恍惚莫知其端先迷失軌後為主君無平不陂道之自然變易更盛消息相因終坤始復如循連環帝王承御千秋常存此以十二卦細分一月之火候亦通一歲之火候也一月之法二日半為一卦復為震之坤臨為兊之坤泰為乾之坤大壯為乾之震夬為乾之兊乾為乾之乾姤為乾之巽遁為乾之艮否為乾之坤觀為坤之巽剝為坤之艮坤為坤之坤臨為復震大壯為復兊乾為復乾遁為復巽觀為復艮坤為復坤其推之例以卦名律名辰名三者而言輻湊即太簇俠例即夾鍾洗濯即姑洗中即仲吕昧冥即林鍾即申任蓄即南閡即亥應即應鍾大率傅會假記不足深究也後為主君蓋亦讀易而後得主為句其誤久矣將欲養性延命却期審思後末當慮其先人所稟軀體本一無元精雲布因氣託初陰陽為度魂魄所居陽神日魂陰神月魄魂之與魄互為室宅性主處內立置鄞鄂情主營外築垣城郭城郭完全人物乃安于斯之時情合乾坤乾動而直氣布精流坤靜而翕為道舍廬剛施而退柔化以滋九還七返八歸六居男白女赤金火相拘則水定火五行之初上善若水清而無瑕道之形象真一難圖變而分布各自獨居類如雞子黑白相扶縱橫一寸以為始初四肢五臟筋骨乃具彌歷十月脫出其胞骨弱可卷肉滑若鉛此與上篇知白相表裏言人之始生亦以陰陽交合而成今欲為丹亦猶是也凡言道者皆丹之託名鉛疑是飴字以似而誤也陽燧以取火非日不生光方諸非星月安能得水漿二氣玄且遠感化尚相通何況近存身切在於心胸陰陽配日月水火為效徵耳目口三寶固塞勿發揚真人潛深淵浮遊守規中旋曲以視覽開闔皆合同為己之軸轄動靜不竭窮離氣內營衛坎乃不用聰兊合不以談希言順以鴻三者既關鍵緩體處空房委志歸虛無無念以為常證難以推移心專不縱橫寢寐神相抱覺悟候存亡顔容寖以潤骨節益堅強辟却衆陰邪然後立正陽修之不輟休庶氣雲兩行淫淫若春澤液液象解冰從頭流達足究竟復上升往來洞無極怫怫被容中反者道之驗弱者德之柄藝鋤宿污穢細微得調暢濁者清之路昏久則昭明此一節乃涵養本原工夫尤未要切朱子曰離氣內營衛嘗見前輩讀內為納其説是也世人好小術不審道淺深棄正從邪徑欲速閼不通猶盲者不任杖聾者聽宫商沒水捕雉兔登山索魚龍植麥欲穫黍運規以求方竭力勞精神終年無見功欲知服食法事約而不煩太陽流珠常欲去人卒得金華轉而相因化為白液凝而至堅金華先倡有頃之間解化為水馬齒闌干陽乃往和情性自然迫促時陰拘畜禁門慈母欲養孝子報恩嚴父施令教飭子孫五行錯王相據以生火性銷金金伐木榮三五為一天地至精可以口訣難以書傳子當左轉午乃東旋卯酉界隔主定二名龍呼於虎虎吸龍精兩相飲食俱相貪便遂相銜咽咀嚼相吞熒惑守西太白經天殺氣所臨何有不傾狸犬守鼠鳥雀畏鸇各有其功何敢有聲不得其理難為妄言竭殫家産妻子飢貧自古及今好者億人訖不諧遇希有能成廣求名藥與道乖殊如審遭逢睹其端緒以類相況揆物終始五行相克更為父母母含滋液父主稟與凝精流形金石不朽審專不泄得為成道言學小術者勞而無功得此法者約而不煩太陽以下與前篇知白熬樞黃輿等章相表裏五行相生母子之恩也火金相克嚴父之令也三五謂火金木並皆稟土氣也一説謂三五即前篇子午戊己也一未詳所指或曰與當作為下篇三五并與一亦放此東疑當作左此言陰陽定位也龍虎六句母子之恩也熒惑太白以下八句嚴父令也不得其理廣求名藥為外丹者也以類相況如前篇言八石正綱紀之類也立竿見影呼谷傳響豈不靈哉天地至象若以野葛一寸巴豆一兩入喉輒僵不得俯仰當此之時雖周文揲蓍孔丘占象扁鵲操針巫咸叩鼓安能令蘇復起馳走河上姹女靈而最神得火則飛不見埃塵鬼隱龍匿莫知所存將欲制之黃芽為根物無陰陽違天背原肥雞自卵其雛不全夫何故乎配合未連三五不交剛柔離分施化之精天地自然猶火動而炎上水流而潤下非有師導使其然者資始統政不可復改觀夫雌雄交媾之時剛柔相結而不可解得其節符非有工巧以制御之若男生而伏女偃其軀稟乎胞胎受氣元初非徒生時著而見之及其死也亦復效之此非父母教令其然本在交媾定制始先坎男為月離女為日日以施德月以舒光月受日化體不虧傷陽失其契陰侵其明朔晦薄蝕奄冒相包陽消其形陰凌生災男女相須含吐以滋雄雌交雜以類相求金化為水水性周章火化為士水不得行故男動外施女靜內藏溢度過節為女所拘魄以檢魂不得淫奢不寒不暑進退合時各得其和俱吐證符以毒藥能殺人為黃芽能制姹女之譬外丹即謂丹砂此未詳何所指也物無陰陽以下皆物理明為此法者當陰陽交合為本也丹砂木精得金乃并金水合處木火為侣四者混沌列為龍虎龍陽數奇虎陰數偶肝青為父肺白為母腎黑為子脾黃為祖三物一家都歸戊己剛柔迭興更歷分部龍西虎東建緯卯酉刑德並會相見歡喜刑主伏殺德主生起二月榆死魁臨於卯八月麥生天罡據酉子南午北互為綱紀九一之數終則復始含元抱真播精於子關關雎鳩在河之洲窈窕淑女君子好逑雄不獨處雌不孤居玄武龜蛇盤蚪相扶以明牝牡畢竟相胥假使二女共室顔色甚姝令蘇秦通言張儀結媒發辨利舌舊舒美辭推心調諧使為夫妻弊髮腐齒終不相知若藥物非種名類不同分劑參差失其紀綱雖黃帝臨爐太一降坐八公搗鍊淮南執火立于崇壇玉為階陛麟脯鳳臘把籍長跪祝章神祇請哀諸鬼沐浴齋戒冀有所望亦猶和膠補釜以硇塗瘡去冷加冰除熱用湯飛龜舞蛇愈見乖張丹砂木精得金乃并即上章姹女黃芽之意心赤脾黃二章諸本無之未詳孰是龍虎子午交錯方位關關以下又以二女明藥物之非種周易參同契卷中
