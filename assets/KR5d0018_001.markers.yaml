  - {type: variant, offset: 12, length: 2, content: 廬陵, WYG: 者而已精水也坎也龍也汞也氣火也離也虎也鈆也其法以神運精氣結而為丹陽氣在下初成水以火煉之則凝成丹其説甚異兩弦合其精乾坤體乃成二八應一斤易道正不傾八日為兌上弦又進八日乃成乾體二十二日為艮下弦又退八日乃成坤體一本註云銖有三百八十四亦應爻之數葢一斤之銖數也自震而起至乾而滿厯㢲而消至坤而盡金入於猛火色不奪精光自開闢以來日月不虧明金不失其重日月形如常金本從月生朔旦受日符金反歸其母月晦日相包𨼆藏其匡郭沉淪於洞虚金復其故性威光鼎乃熺金即鈆也金歸其母復其故性謂斂藏不用日不照月純坤卦也熺字本作喜一本作僖今按皆無理案説文熺炎也}
