  - {type: variant, offset: 10, length: 0, content: '', WYG: 舒此總明日月為易之意下乃詳言其法與一月之火候晦至朔旦震來受符當斯之時天地媾其精日月相撢持雄陽播𤣥施雌隂化黄包混沌相交接權輿樹根基經營養鄞鄂凝神以成軀衆夫蹈以出蠕動莫不由于是仲尼贊洪濛乾坤德洞虚稽古稱元皇闗睢建始初冠婚氣相紐元年乃牙滋聖人不虚生上觀顯天符天符有進退詘信以應時此書之法以一月為六節分屬六卦震一兌二乾三㢲四艮五坤六每五日為一節故言朔旦則震始用事而為日月隂陽交感之初于是加修煉之功如聖人之作六經皆有所托始也此實一篇之要言而雄陽播𤣥施雌隂化黄包又一節之要處他皆以明此耳故易統天心復卦建始萌長子繼父體因母立兆基消息應鍾律升降據斗樞此又以一月為十二節以復臨泰壯夬乾姤遯否觀剥坤為序每二日半為一節復即前六節震卦之内體也長子震也父乾也母坤也下章云朔旦為復三日出為爽震受庚西方八日兌受丁上弦平如繩十五乾體就盛滿甲東方三日第一節之中月生明之時也葢始受一陽之光而昏見于西方庚地也八日第二節之中月上弦之時葢受二陽之光而昏見于南方丁地也十五日第三節之中月既望之時全受日光盛滿而昏見于東方之甲地也蟾蜍與兎魄日月无雙明蟾蜍眡卦節兎者吐生光此言望夕之月全受日光而借蟾為瞻借兎為吐也七八道已訖屈折低下降十六轉受統㢲辛見平明艮直于丙南下弦二十三坤乙三十日東北喪其明節盡相禪與繼體復生龍壬癸配甲乙乾坤括始終七八謂十五日也十六日謂第四節之始也始生下一隂為㢲而成魄以平旦而沒于西方辛地也二十三日第五節之中復生中一隂為艮而下弦以平旦而沒于南方丙地也三十日第六節之終全變三陽而光盡體伏于東北借易朋字作明字也一月六節既盡而禪于後月長子繼父復生震卦壬配甲癸配乙皆屬乾坤括十日之始終自晦至朔旦至此一月之火候也附朱子曰一息之間便有晦朔弦望上弦者氣之方息自上而下也下弦者氣之方消自下而上也望者氣之盈也日沉于下而月圓于上也晦朔之間日月之合乎上所謂舉水以滅火金來歸性初之𩔖是也七八數十五九六亦相應四者合三十陽氣索滅藏索盡也八卦列布曜運移不失中𤣥精眇難覿推度效符證居則觀其象凖擬其形}
