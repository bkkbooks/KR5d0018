  - {type: variant, offset: 11, length: 0, content: '', WYG: 立表以為範占候定吉凶發號順時令勿失爻動時上察河圖文下序地形流中稽于人情參同考三才動則循卦節静則因彖辭乾坤用施行天下然後治此用乾坤用九天下治也之語上言乾坤用即用九用六也治或作理葢避唐諱此下至國無害道皆以國政為喻可不慎乎御政之首管括密微闓舒布寳要道魁柄統化綱紐爻象内動吉凶外起五緯錯順應時感動四七乖戾侈離俯仰文昌總録詰責台輔百官有司各典所部日合五行精月受六律紀五六三十度度竟復更始原始要終存亡之緒或君驕佚亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法刺譏結過移主辰極受正優游任下明堂布政國無害道此皆取譬之言然其間亦有可詳味者内以養已安静虚无元本𨼆明内照形軀閉塞其兊築固靈株三光陸沉温養子珠視之不見近而易求黄中漸通理潤澤達肌膚初正則終修幹立末可持一者以掩蔽世人莫知之此乃以内事言之于經中最為要切而三光陸沉温養子珠之一言又要切之要切者前所譬御政之首魁柄綱紐正謂此也初正幹立原始而言也終修末持要終而言也一者以掩蔽言其造端之處𨼆而不章者也上德无為不以察求下德為之其用不休上閉則稱有下閉則稱无无者以奉上上有神德居此兩孔穴法金氣亦相胥此下漸難通曉今畧以意解之上德即上文所謂雌隂化黄包三光陸沉下文所謂汞白為流珠青龍與之俱所謂流珠水之母者正思慮所不及也下德即上文所謂雄陽播𤣥施温養子珠下文所謂白虎為熬樞黄土金之父者正著意用力處也閉則皆失其所宜矣下不可無故無者以奉上神德謂微妙處龍虎經作上有青龍居金氣即謂雄陽白虎也大率陽既下即隂自上矣所謂孔穴者此也鼎器歌云隂在上陽下奔此亦至要之言知白守黑神明自來白者金精黑者水基水者道樞其散各一白謂汞黑為鈆金精言其生于鈆水基能生水也白黑各一而水為道樞所謂神德者也隂陽之始𤣥含黄牙五金之主北方河車𤣥含黄牙水中有土静而有意也北方河車黑而生水也以下文考之正謂鈆耳故鈆外黑内懐金華被褐懐玉外為狂夫鈆即上文所謂金氣金為水母母𨼆子胎水者金子子藏母胞此即上文知白守黑之義真人至妙若有若无仿佛大淵乍沈乍浮退而分布各守境隅此所謂温養子珠者也望之𩔖白造之則朱鍊為表衛白裏貞居方圓徑寸混而相拘先天地生巍巍尊高旁有垣闕狀似蓬壺環匝闗閉四通踟蹰守禦密固閼絶姦邪曲閣相通以戒不虞徑寸即所謂子珠者垣闕疑即下文所謂情主營外恒為城闕者耶皆未詳其何説可以无思難以愁勞神氣滿堂莫之能留守之者昌失之者亡動静休息常與人俱是非厯藏法内視有所思履行步斗宿六甲以日辰隂道厭九一濁亂㺯𤣥胞食炁鳴腸胃吐正吸新邪晝夜不卧寐晦朔未嘗休身體以疲倦恍惚狀若癡百脈鼎沸馳不得清澄居周迴立壇宇朝暮敬祭祠鬼物見形象夢寐感慨之心懽意喜悅自謂必延期遽以夭命死腐露其形骸舉措輙有違悖逆失樞機諸術甚衆多千條有萬餘前却違黄老曲折戾九都言此道與諸旁門小法之不同不能詳解明者省厥㫖曠然知所由勤而行之夙夜不休服食三載輕舉逺游入火不焦入水不濡能存能亡長樂無憂道成德就潛伏竢時太乙乃召移居中洲功滿上昇膺籙受圖火記不虚作演易以明之偃月法鼎爐白虎為熬樞汞日為流珠青龍與之俱舉東以合西魂魄自相拘上弦兌數八下弦亦如之偃月疑前下圓後上缺狀如偃月也白虎鈆也火也氣也西也魄也陽也為熬樞言下奔而致蒸潤上行也汞日精也青龍水也東也魂也隂也上弦陽也下弦隂也附朱子曰坎離水火龍虎銘汞之屬只是互換其名其實只是精氣}
