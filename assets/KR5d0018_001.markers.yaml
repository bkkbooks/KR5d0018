  - {type: line-break, offset: 0, content: '', id: KR5d0018_HFL_001-001a01}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書}
  - {type: page-break, offset: 0, content: '', id: KR5d0018_WYG_001-1a, image: WYG1058/WYG1058-0559a.png}
  - {type: page-break, offset: 0, content: '', id: KR5d0018_SJB_001-200125a, image: sjb/20/200125a.png}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 考異宋朱子撰五代彭曉解義序曰魏伯陽㑹稽上虞人修真潛默養志虚無博贍文詞通諸緯候得古人龍虎經盡獲妙㫖乃約周易譔參同契三篇復作補塞遺脱一篇所述多以寓言借事𨼆顯異文密示青州徐從事徐乃𨼆名而注之桓帝時公復傳授與同郡淳于叔通遂行於世參雜也同通也契合也謂與周易理通而義合也其書假借君臣以彰内外叙其離坎直指汞列以乾坤奠量鼎器明之父母保以始終合以夫妻拘其交媾譬諸男女顯以滋生析以隂陽導之反復示之晦朔通以降騰配以卦爻形于變化隨之斗柄取以周星分以晨昏昭諸刻漏莫不託易象而論之故明周易參同契云附按參同契注本凡一十九部三十一}
  - {type: page-break, offset: 5, content: '', id: KR5d0018_WYG_001-1b, image: WYG1058/WYG1058-0559b.png}
  - {type: page-break, offset: 5, content: '', id: KR5d0018_WYG_001-2a, image: WYG1058/WYG1058-0559c.png}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 其目載夾漈鄭氏藝文略彭曉本最傳然分三卷為九十章以應陽九之數歌鼎器一篇以應水一之數其傅㑹𩔖如此葢效河上公分老子為上經下經八十一章而其實非也鮑氏云彭本為近世淺學妄更秘館所藏民間所録差誤衍脱莫知適從朱子考辨正文引證依據其本始定今不敢又贅附諸說云附朱子曰參同契本不為明易姑借此納甲之法以寓其行持進退之候異時每欲學之而不得其傳無下手處不敢輕議然其所言納甲之法則今所傳京房占法見于火珠林者是其遺法所云甲乙丙丁庚辛者乃以月之昏旦出沒言之非以分六卦之方也此雖非為明易而設然易}
  - {type: page-break, offset: 6, content: '', id: KR5d0018_WYG_001-2b, image: WYG1058/WYG1058-0559d.png}
  - {type: punctuation, offset: 7, content: (, id: KR5d0018_krp_001-bkkpn1}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 無所不有茍其言自成一家可推而通則亦無害于易伯陽參同契恐希夷之學有些自其源流先天圖與納音相應蔡季通言與參同契合以圖觀之坤復之間為晦震為初三一陽生八日為兌月上弦十五日為乾十八日為㢲一陰生二十三日為艮月}
  - {type: page-break, offset: 7, content: '', id: KR5d0018_WYG_001-3a, image: WYG1058/WYG1058-0560a.png}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 弦坎離為日月故不用參}
  - {type: punctuation, offset: 9, content: /, id: KR5d0018_krp_001-bkkpn2}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 以坎離為藥餘者以為火候邵子發明先天圖圖傳自希夷希夷又自有所傳葢方士技術用以修煉參同契所言是也參同契文章極好葢後漢之能文者為之其用字皆根據古書非今人所能解以故皆為人妄解世間本子極多其中有云千周燦彬彬兮萬遍將可睹神明或告人兮魂靈忽自悟言誦之久則文義要訣自見須溪劉氏曰古書惟參同契似先秦文上篇乾坤者易之門户衆卦之父母乾坤以宇内言之則乾天在上坤地在下而陰陽變化萬物終始皆在其間以人身言之則乾陽在上坤隂在下而一身之隂陽萬物變化終始皆在其間此乾坤所以為易之門户衆卦之父母也凡言易者皆指陰陽變化而言在人則所謂金丹大藥者也然則乾坤其爐鼎歟坎離匡郭運轂正軸乾坤位乎上下而坎離升降于其間所謂易也先天之位乾南坤北離東坎西是也故其象如垣郭之形其升降則如車軸之貫轂以運輪一下而一上也轂車輪之心外實而持輻内空以受軸者也軸車下横木兩頭貫轂而受轄者也牝牡四卦以為槖籥牝牡謂配合之四卦震兑㢲艮是也槖鞴囊籥其管也葢納甲之法乾為望坤為晦而坎離升降于其間震為生明而兑為上弦㢲為生魄而艮為下弦如鼓鞴之有緩急也附朱子曰邵子云乾坤定上下之位坎離列左右之門參同契首卦位鋪排都只一般覆冒隂陽之道猶工御者執銜轡凖繩墨隨軌轍處中以制外數在律厯紀此言人心能統隂陽運轂軸以成丹也銜轡謂所以使隂陽者繩墨謂火候軌轍指其升降之所由中謂心外謂氣數即下文六十卦之火候也月節有五六經緯奉日使兼並為六十剛柔有表裏月以五日為一節六節為一周兼晝夜為六十以配六十卦晝剛夜柔剛裏柔表葢六十四卦除乾坤坎離為爐竈丹藥所用以為火侯者止六十卦也朔旦屯直事至暮蒙當受晝夜各一卦用之如次序此六十卦之凡例一月而一周葢逐日用功時刻之早晚也既未至晦爽終則復更始日辰為期度動静有早晚既未謂晦日之卦朝既濟莫未濟也爽謂生明之時春夏據内體從子到辰巳秋冬當外用自午訖戌亥春夏為朝秋冬為莫内體謂前卦外用謂後卦此亦六十卦之凡例後篇屯以子申蒙用寅戌乃以納甲之法盡發之大率一日所用子午夘酉四時而已賞罰應春秋昏明順寒暑爻辭有仁義隨時發喜怒如是應四時五行得其序此言朝暮用功有不同之處未詳其説天地設位而易行乎其中矣天地者乾坤也設位者列隂陽配合之位也易謂坎離坎離者乾坤二用此引易而釋之以明乾坤坎離之用言乾上而坤下離降而坎升也乾坤二用謂乾用九坤用六九老陽六老隂也二用無爻位周流行六虚往來既不定上下亦無常幽潛淪匿升降于中包囊萬物為道紀綱以無制有器用者空故推消息坎離沒亡乾坤二卦六爻九六各有定位唯用九用六無定位而六爻之九六即此九六之周流升降也納甲之法乾納甲壬坤納乙癸震納庚㢲納辛艮納丙兌納丁皆有定位而坎納戊離納已無定位葢六卦之隂陽即坎離中爻之周流升降也故以此之無制彼之有知器有形而其用乃在其形之空處葢用老子所謂挻埴以為器當其無有器之用之語也消息謂自坤之息厯震兌而極于乾自乾而消厯㢲艮而極于坤也沒亡謂無位也後章用九翩翩為易宗祖一節亦是此意也附朱子曰或問參同本是龍虎上經果否曰不然葢是後人見伯陽傳有龍虎上經一句遂偽作此經大槩皆是括參同之語而為之也其間有説錯了處如二用云者用九用六九六亦坎離也六虚者即乾坤之初二三四五上六爻位也言二用雖無爻位而常周流乎乾坤六爻之間猶人之精氣上下周流乎一身而無定所也龍虎經却錯説作虚危去葢討頭不見牽合一字來説附按彭氏以為魏公得古文龍虎經而譔參同契朱子以為經乃後人偽作今考參同契中有古文記龍虎之文往往古有其文如火記之𩔖特恐非今所傳者耳鮑氏云此乃三墳書狐首經之比未可知也附又按金碧古文龍虎上經差簡于參同契然其語次布置與契不甚相逺而加整焉末云火記不虚作亦契中語也然則火記又參同之所出歟言不茍造論不虚生引驗見効挍度神明推𩔖結字原理為徵坎戊月精離已日光日月為易剛柔相當土王四季羅絡始終青赤白黑各居一方皆稟中宫戊己之功此以造字之法明坎月離日之合而為易也葢坎戊離已皆居中宫土位而四方四行皆稟其氣易者象也懸象著明莫大乎日月窮神以知化陽往則隂來輻湊而輪轉出入更}
