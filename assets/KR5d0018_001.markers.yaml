  - {type: variant, offset: 3233, length: 0, content: '', WYG: 下篇惟昔聖賢懐𤣥抱真服鍊九鼎化跡𨼆淪含精養神通德三元精液湊理筋骨緻堅衆邪辟除正氣常存累積長久變形而仙憂憫後生好道之倫隨傍風采指畫古文著為圖籍開示後昆露見枝條𨼆藏本根託號諸石覆冒衆文學者得之韞櫝終身子繼父業孫踵祖先傳世迷惑竟無見聞遂使宦者不遂農夫失耘商人棄貨志士家貧吾甚傷之定録斯文字約易思事省不煩披列其條實核可觀分兩有數因而相循故為亂辭孔竅其門智者審思以意參馬言昔之仙者著書示人而不明言其事託名諸石為身内隂陽之號故學者多失其指今著此書省約易曉仍恐漏泄故多謬亂之辭而孔竅其門也其下歌辭又撮一書大指云附按亂辭如離騷之亂曰也下文可見法象莫大乎天地兮𤣥溝數萬里河鼓臨星紀兮人民皆驚駭晷景妄前却兮九年被凶咎皇上覽眎之兮王者退自改闗鍵有低昻兮害炁遂奔走江淮之枯竭兮水流注於海此一節言水溢之咎王者能自改則害氣息而水土平矣𤣥溝葢謂天漢河鼓星名星紀丑位未詳其説九年謂洪水闗鍵低昻謂隂陽升降也害氣災害之氣以人身取譬而言亦為水火不既濟之象附朱子曰𤣥溝害氣恐未是説人身内事方是設譬之辭王莽傳曰害氣将究矣葢上文説洪水為災而王者能改故害氣去而洪水平也害訛作周又訛作固後人遂妄改為精而増而字皆非是然因周字可見其為害字葢篆𨽻文皆相似也天地之雌雄兮徘徊子與午寅申隂陽祖兮出入復終始循斗而招搖兮執衡定元紀升熬于甑山兮炎火張設下白虎倡導前兮蒼液和於后附朱子曰虎一作礜一作礬按三字皆假名但下句云蒼液即此合作礜與礬而前有礜磁之文即作礜為得然下句又云朱烏及再列三獸之名位則此當為虎而液亦當為龍矣倡導前即前所謂熬樞下文云和于後即此似皆指有情之物作龍虎為當也此一節又是以火烹水以水㓕火金水相合復還本初之意朱鳥翺翔戲兮飛揚色五采遭遇網羅施兮壓止不得舉嗷嗷聲甚悲兮如嬰兒慕母顛倒就湯鑊兮摧折傷毛羽漏刻未過半兮龍鱗狎獵起五色象炫耀兮變化無常主潏潏鼎沸馳兮暴涌不休止雜遝重疊累兮犬牙相錯拒形如仲冬氷兮闌干吐鍾乳崔嵬以雜厠兮兼積相支柱隂陽得其配兮淡泊自相守青龍處房六兮春華震東夘白虎在七兮秋芒兊西酉朱雀在張二兮正陽離南午三者俱來朝兮家屬為親侣本之但二物兮末乃為三五三五并與一兮都集歸二所治之如上科兮日數亦取甫先白而後黄兮赤色通表裏名曰第一鼎兮食如大黍米此復總言還丹之法撮其精要子午謂乾坤寅申謂坎離升熬即所謂熬樞伏蒸者白虎金青龍水朱雀火以金生水水而滅火以成丹其形如此前所謂先液後凝馬齒闌干是也嗷嗷聲正悲亦前所謂晝夜聲正勤者隂陽得配淡泊相守即所謂各守境隅各自獨居者房東方七宿之中六其度數也七張二放此二物謂隂陽三五謂火金木皆稟土氣也并與一詳其文意與似當作為二所取甫皆未詳其文義自然之所為兮非有邪偽道山澤氣相烝兮興雲而為雨泥竭乃成塵兮火滅自為土若蘗染為黄兮似藍成緑組皮革煮為膠兮麴糵化為酒同𩔖易施功兮非種難為巧譬上事惟斯之妙術兮審諦不誑語傳於億代後兮昭然而可考煥若星經漢兮昺如水宗海思之務令熟兮反復眎上下千周燦彬彬兮萬徧將可覩神明或告人兮魂靈忽自悟探端索其緒兮必得其門户天道無適莫兮常傳與賢者言其書指著明學者但能讀千周萬徧則當自曉悟如神明告之也董遇云讀書千徧其義自見又曰思之思之又重思之思之不通鬼神將教之非鬼神之力也精神之極也非妄語也五相𩔖此篇五章一參同二太易三象彼四鄶國五委時參同契者敷陳梗槩不能純一纎微未備缺畧髣髴今更撰録補塞遺脱潤色幽深鉤援相逮㫖意等齊所趣不悖故復作此命五相𩔖則太易之情性盡矣太易情性各如其度黄老用究較而可御爐火之事真有所據三道由一俱出徑路枝莖華葉果實垂布正在根株不失其素誠心所言審而不誤象彼仲冬節竹木皆摧傷佐陽詰商旅人君深自藏象時順節令閉口不用談天道甚浩曠太𤣥無形容虚寂不可覩匡郭以消亡謬誤失事緒言還自敗傷别序斯四象以曉後生盲此言晦朔之間渾沌鴻濛𨼆形而藏之時也太𤣥無形容上善若水真一難圖之象也四象未詳鄶國鄙夫幽谷朽生附朱子曰魏君實上虞人當作㑹稽或是魏𨼆語作鄶挾懐朴素不落權榮棲遲僻陋忽略令名執守恬淡希時安平逺客燕間乃撰斯文歌叙大易三聖遺言察其㫖趣一統共倫務在順理宣耀精神神化流通四海和平表以為厯萬世可循序以御政行之不煩引内養性黄老自然含德之厚歸根返元近在我心不離已身抱一母舍可以長存配以服食雄雌設陳挺除武都八石棄捐審用成功世俗所珍羅列三條枝莖相連同出異名皆由一門非徒累句諧偶斯文殆有其真礫硌可觀使余敷偽却被贅愆命參同契微覽其端辭寡意大後嗣宜遵委時去害依托丘山循遊寥廓與鬼為隣化形而仙淪寂無聲百世一下遨遊人間陳敷羽翮東西南傾湯遭厄際水旱隔并柯葉萎黄失其華榮吉人相乘負安穏可長生鼎器歌圓三五寸一分口四八兩寸唇長二尺厚薄匀腹三齊坐垂温二尺或作尺二彭曉解作二尺三齊一作齊三按齊即臍字隂在上陽下奔此二句是要法首尾武中間文隂火白黄芽鈆兩七竅輔翼人膽理腦定升𤣥子處中得安存來去遊不出門漸成大性情純却歸一還本原至一周甚辛勤密防䕶莫迷昏途路逺極幽𤣥若達此㑹乾坤樂道者尋其根審五行定銖分諦思之不須論深藏守莫傳文御白鶴兮駕龍鱗遊太虚兮謁仙君録天圖兮號真人}
