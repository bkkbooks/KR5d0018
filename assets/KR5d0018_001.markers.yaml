  - {type: line-break, offset: 0, content: '', id: KR5d0018_HFL_001-001a02}
  - {type: indent, offset: 0, content: 　　　　, id: KR5d0018_krp_001-bkkind1}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 漢多用此字子午數合三戊已號稱五三五既和諧八石正綱紀嘑吸相貪欲佇思為夫婦黄土金之父流珠水之母水以土為鬼土填水不起朱雀為火精執平調勝負水勝火消滅俱死歸厚土三性既合㑹本性共宗祖子水一午火二數合三也戊己土其數五三五合而為八八石象也然其實但水火二物而以土為主耳土屬脾脾主意謂以意使火下而水上相呼吸也金即火也朱雀疑指心而言又意之主也此火字與前章熬字意不同别是一火也執平謂執衡司夏也此書之意大抵為以火烹水以水滅火亦如前章月受日光反歸其母之意也巨勝尚延年還丹可入口金性不敗朽故為萬物寳術士服食之夀命得長久土遊於四季守界定規矩金砂入五内霧散若風雨重烝達四肢顔色悦澤好髮白更生黑齒落出舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰真人此言内丹而言入口未詳其㫖餘見後章馳入赤色門下胡粉投火中色壊還為氷雪得温湯解釋成太𤣥金以砂為主稟和於水銀變化由其真終始自相因此皆以同𩔖相變為譬也欲作服食仙宜以同𩔖者植禾當以粟覆雞用其子以𩔖輔自然物成易陶冶魚目豈為珠蓬蒿不成檟𩔖同者相從事乖不成寳是以燕雀不生鳳狐兎不乳馬水流不炎上火動不潤下又以異𩔖不能相成反覆明之世間多}
  - {type: page-break, offset: 3, content: '', id: KR5d0018_WYG_001-18a, image: WYG1058/WYG1058-0567c.png}
  - {type: page-break, offset: 3, content: '', id: KR5d0018_WYG_001-18b, image: WYG1058/WYG1058-0567d.png}
  - {type: page-break, offset: 3, content: '', id: KR5d0018_WYG_001-19a, image: WYG1058/WYG1058-0568a.png}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 士高妙負良才邂逅不遭植耗火亡貨財據按依文説妄以意為之端緒無因縁度量失操持擣治羌石膽雲母及礜磁硫}
  - {type: substitution, offset: 4, original: 黄, replacement: 黃, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4545}}
  - {type: variant, offset: 5, length: 1, content: 瑞, WYG: 燒豫章泥汞相煉治鼔下五石銅以之為輔樞雜性不同種安肯合體居千舉必萬敗欲反成癡穉年至白首中道生狐疑背道守迷路出正入邪蹊管窺不廣見難以揆方來此言為外丹者藥非同𩔖不能成寳若夫至聖不過伏羲畫八卦效天圖文王帝之宗結體演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更御時優劣有步驟功德不相殊制作有所踵推度審分銖有形易忖量無兆難慮謀作事令可法為世定詩書素無前識資因師覺悟之皓若褰帷帳瞋目登高臺言三聖迭興事有優劣葢伏羲法天文王踵羲夫子踵文有形者易制無形者難及也因自言因師以悟此理也詩書兩句未詳火記六百篇所趣等不殊文字鄭重説世人不熟思尋度其源流幽明本共居竊待賢者談曷敢輕為書結舌欲不語絶道獲罪誅寫情寄竹帛恐泄天之符猶豫増歎息俯仰綴斯愚陶冶有法度未忍悉陳敷略述其紀綱枝條見扶疎火記六百篇葢古書今亡未可知以金為隄防水火仍優游金數十有五水數亦如之臨爐定銖兩五分水有餘二者以為真金重如本初其三遂不入水二與之俱三物相含受變化狀若神下有太陽炁伏烝須㬰間先液而後凝號曰黄輿焉此言丹之第一變也金水並見上入一作火據下文三物即當作火然又云下有太陽炁則似只是二物恐當作八而三亦當作二耳此是金水數皆十五而五分其水只用其二葢十五之六也其三則十五之九也水二一作火二與上水火下三物相應但上無火之銖兩下又有太陽字則又未必然也二物相含受即隂陽坎離之交三物之誤甚明嵗月將欲訖毁性傷夀年形體為灰土狀若明窓塵此是第二變也擣治并合之馳入赤色門固塞其際㑹務令致完堅炎火張於下晝夜聲正勤始文使可修終竟武乃陳候視加謹慎審察調寒温周旋十二}
