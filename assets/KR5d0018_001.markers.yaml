  - {type: variant, offset: 7, length: 2, content: 附録, WYG: 節盡更須親炁索命將絶休死亡魄魂色轉更為紫赫然成還丹粉提以一丸刀圭最為神此第三變也擣治并合此當别有所作用赤色門謂口也液凝灰土理須自見葢吐出而鍊治之復吞納也炎火即所謂太陽炁聲正勤後章亦言嗷嗷聲正悲如嬰兒慕母是也脩疑作循字唐人兩事多互見氣索命絶又是前章火滅金復之意粉提刀圭未詳推演五行數較約而不煩舉水以激火奄然滅光榮日月相激薄常存晦朔間水盛坎侵陽火衰離晝昏隂陽相飲食交感道自然名者以定情字者縁性言金來歸性初乃得稱還丹此解上文還丹得名之義因火滅而金復也吾不敢虚説放效聖人文古記題龍虎黄帝美金華淮南鍊秋石王陽加黄牙賢者能持行不肖母與俱古今道由一對談吐所謀學者加勉力留念深思惟至要言甚露昭昭不我欺}
