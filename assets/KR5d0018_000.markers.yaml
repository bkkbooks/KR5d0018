  - {type: variant, offset: 2342, length: 495, content: 爲日月陰陽交感之初於是加修鍊之功如聖人之作六經皆有所托始也此實一篇之要言而雄陽播玄施雌陰化黄包又一節之要處他皆以明此耳故易統天心復卦建始萌長子繼父體因母立兆基消息應鍾律升降據斗樞此又以一月爲十二節以復臨泰壯夬乾姤遯否觀剥坤爲序每二日半爲一節復即前六節震卦之内體也長子震也父乾也母坤也下章云朔旦爲復三日出爲爽震受庚西方八日兊受丁上弦平如繩十五乾體就盛滿甲東方三日第一節之中月生明之時也蓋始受一陽之光而昏見於西方庚地也八日第二節之中月上弦之時蓋受二陽之光而昏見於南方丁地也十五日第三節之中月旣望之時全受日光盛滿而昏見於東方之甲地也蟾蜍與兔魄日月氣雙明蟾蜍眡卦節兔者吐生光此言望夕之月全受日光而借蟾爲瞻借兔爲吐也七八道己訖屈折低下降十六轉受統巽辛見平明艮直於丙南下弦二十三坤乙三十日東北喪其明節盡相禪與繼體復生龍壬癸配甲乙乾坤括始終七八謂十五日也十六日謂第四節之始也始生下一陰爲巽而成魄以平旦而没於西方辛地也二十三日第五節之中復生中一陰爲艮而下弦以平旦而没於南方丙地也三十日第六節之終全變三陽而光盡體伏於東北借易朋字作明字也一月六節旣盡而襌於後月長子繼父復生震卦壬配甲癸配乙皆屬乾坤括十日之始終自, WYG: ''}
