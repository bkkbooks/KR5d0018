  - {type: variant, offset: 2838, length: 640, content: 至朔旦至此一月之火候也朱子曰一息之間便有晦朔弦望上弦者氣之方息自上而下也下弦者氣之方消自下而上也望者氣之盈也日沈于下而月圓于上也晦朔之間日月之合乎上所謂舉水以滅火金來歸性初之類是也七八數十五九六亦相應四者合三十陽氣索滅藏索盡也八卦列布曜運移不失中玄精眇難覿推度效符證居則觀其象準擬其形容立表以爲範占候定吉凶發號順時令勿失爻動時上察河圖文下序地形流中稽於人情參同考三才動則循卦節靜則因彖辭乾坤用施行天下然後治此用乾坤用九天下治也之語上言乾坤用即用九用六也治或作理蓋避唐諱此下至國无害道皆以國政爲喻可不愼乎御政之首管括密微闓舒布寳要道魁柄統化綱紐爻象内動吉凶外起五緯錯順應時感動四七乖戾侈離俯仰文昌總録詰責台輔百官有司各典所部日合五行精月受六律紀五六三十度度竟復更始原始要終存亡之緒或君驕佚亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法剌譏結過移主辰極受正優游任下明堂布政國无害道此皆取譬之言然其間亦有可詳味者内以養己安靜虚無元本隱明内照形軀閉塞其兊築固靈株三光陸沈温養子珠視之不見近而易求黄中漸通理潤澤達肌膚初正則終脩榦立末可持一者以掩蔽世人莫知之此乃以内事言之於經中最爲要切而三光陸沈温養子珠之一言又要切之要切者前所譬御政之首魁柄綱紐正謂此也初正榦立原始而言也終脩末持要終而言也一者以掩蔽言其造端之處隱而不章者也上德無爲不以察求下德爲之其用不休上閉則稱有下閉則稱无无者以奉上上有神德居此兩孔穴法金氣亦相胥此下漸難通曉今略以意解之上德即上文所謂雌陰化黄包三光陸沈下文所謂汞白爲流珠青龍, WYG: 菴}
