  - {type: variant, offset: 1749, length: 551, content: 也朱子曰或問參同本是龍虎上經果否曰不然蓋是後人見伯陽傳有龍虎上經一句遂僞作此經大㮣皆是櫽括參同之語而爲之也其間有說錯了處如二用云者用九用六九六亦坎離也六虚者即乾坤之初二三四五上六爻位也言二用雖无爻位而常周流乎乾坤六爻之間猶人之精氣上下周流乎一身而无定所也龍虎經却錯說作虚危去蓋討頭不見牽合一宇來說按彭氏以爲魏公得古文龍虎經而譔參同契朱子以爲經乃後人僞作今考參同契中有古文記龍虎之文往往古有其文如火記之類特恐非今所傅者耳鮑氏云此乃三墳書狐首經之比未可知也又按金碧古文龍虎上經差簡於參同契然其語次布置與契不甚相遠而加整焉末云火記不虚作亦契中語也然則火記又參同之所自出與言不苟造論不虚生引驗見効校度神明推類結字原理爲徵坎戊月精離己日光日月爲易剛柔相當土王四季羅絡始終青赤白黑各居一方皆禀中宫戊己之功此亦造字之法明坎月離日之合而爲易也蓋坎戊離己皆居中宫土位而四方四行皆禀其氣易者象也懸象著明莫大乎日月窮神以知化陽往則陰來輻凑而輪轉出入更卷舒此總明日月爲易之意下乃詳言其法與一月之火候晦至朔旦震來受符當斯之時天地媾其精日月相撢持雄陽播玄施雌陰化黄包混沌相交接權輿樹根基經營養鄞鄂凝神以成軀衆夫蹈以出蠕動莫不由於是仲尼贊洪濛乾坤德洞虚稽古稱元皇關雎建始初冠婚氣相紐元年乃芽滋聖人不虚生上觀顯天符天符有進退詘信以應時, WYG: ''}
