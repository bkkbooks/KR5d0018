  - {type: variant, offset: 3657, length: 1096, content: 水爲道樞所謂神德者也陰陽之始玄含黄芽五金之主北方河車玄含黄芽水中有土靜而有意也北方河車黑而生水也以下文考之正謂鉛耳故鉛外黑内懷金華被褐懷玉外爲狂夫鉛即上文所謂金氣金爲水母母隱子胎水者金子子藏母胞此即上文知白守黑之義眞人至妙若有若无彷彿大淵乍沈乍浮退而分布各守境隅此所謂温養子珠者也望之類白造之則朱鍊爲表衛白裏貞居方圓徑寸混而相拘先天地生巍巍尊高旁有垣闕狀似蓬壺環帀關閉四通踟蹰守禦密固閼絶姦邪曲閣相通以戒不虞徑寸即所謂子珠者垣闕疑即下文所謂情主營外垣爲城郭者耶皆未詳其何說可以无思難以愁勞神氣滿堂莫之能留守之者昌失之者亡動靜休息常與人俱是非歷藏法内視有所思履行步斗宿六甲以日辰陰道厭九一濁亂弄玄胞食氣鳴腸胃吐正吸新邪晝夜不卧寐腸鳴未嘗休身體以疲倦恍惚狀若癡百脉鼎沸馳不得清澄居周回立壇宇朝暮敬祭祠鬼物見形象夢寐感慨之心懽意喜悅自謂必延期遽以夭命死腐露其形骸舉措輙有違悖逆失樞機諸術甚衆多千條有萬餘前却違黄老曲折戾九都言此道與諸旁門小法之不同不能詳解明者省厥㫖曠然知所由勤而行之夙夜不休服食三載輕舉遠遊入火不焦入水不濡能存能亡長樂無憂道成德就潜伏竢時太一乃召移居中洲功滿上昇應籙受圖火記不虚作演易以明之偃月法鼎爐白虎爲熬樞汞日爲流珠青龍與之俱舉東以合西魂魄自相拘上弦兊數八下弦亦如之偃月疑前下圓後上缺狀如偃月也白虎鉛也火也氣也西也魄也陽也爲熬樞言下奔而致蒸潤上行也汞日精也青龍水也東也魂也陰也上弦陽也下弦陰也朱子曰坎離水火龍虎鉛汞之屬只是互換其名其實只是精氣二者而已精水也坎也龍也汞也氣火也離也虎也鉛也其法以神運精氣結而爲丹陽氣在下初成水以火鍊之則凝成丹其說甚異兩弦合其精乾坤體乃成二八應一斤易道正不傾八日爲兊上弦又進八日乃成乾體二十三日爲艮下弦又退八日乃成坤體一本註云銖有三百八十四亦應爻之數蓋一斤之銖數也自震而起至乾而滿歷巽而消至坤而盡金入於猛火色不奪精光自開闢以來日月不虧明金不失其重日月形如常金本從月生朔旦受日符金反歸其母月晦日相包隱藏其匡郭沈淪於洞虚金復其故性威光鼎乃熺金即鉛也金歸其母復其故性謂歛藏不用日不照月純坤卦也熺字本作喜一本作僖今按皆無理案說文熺炎也後漢多用此字子午數合三戊己號稱五三五旣和諧八石正綱紀嘑吸相貪欲佇思爲夫婦黄土金之父流珠水之母水以土爲鬼土塡水不起朱雀爲火精執平調勝負水勝火消滅俱死歸厚土三性旣合會本性共宗祖子水一午火二數合三也戊己土其數五三五合而爲八八石象也然其實但水火二物而以土爲主耳土屬脾脾主意謂以意使火下而水上相呼吸也金即火也朱雀疑指心而言又意之主也此火字與前章熬字意不同别是一火也執平謂執衡司夏也此晝之意大抵爲以火烹水以水滅火亦如前章月受日光反歸其母, WYG: 逃}
