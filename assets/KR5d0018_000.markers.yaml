  - {type: variant, offset: 57, length: 322, content: 約周易譔參同契三篇復作補塞遺脱一篇所述多以寓言借事隱顯異文密示青州徐從事徐乃隱名而注之桓帝時公復傳授與同郡淳于叔通遂行於世參雜也同通也契合也謂與周易理通而義合也其書假借君臣以彰内外叙其離坎直指汞鉛列以乾坤奠量鼎器明之父母保以始終合以夫妻拘其交媾譬諸男女顯以滋生析以陰陽導之反復示之晦朔通以降騰配以卦爻形於變化隨之斗柄取以周星分以晨昏昭諸刻漏莫不託易象而論之故名周易參同契云按參同契註本凡一十九部三十一卷其目載夾漈鄭氏藝文略彭曉本最傳然分三卷爲九十章以應陽九之數歌鼎器一篇以應水一之數其傅會類如此蓋效河上公分老子爲上經下經八十一章而其實非也鮑氏云彭本爲近世淺學妄更祕館所藏民間所録差誤衍脱莫知適從朱子考辨正文引證依據其本始定今不敢又贅附諸說云朱子, WYG: ''}
