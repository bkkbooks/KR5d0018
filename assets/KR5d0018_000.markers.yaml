  - {type: variant, offset: 3, length: 1, content: 學, WYG: 治之治字云或作理威光鼎乃熺之熺字云本作僖參證他本者不過二處又如修字疑作循六五疑作廿六鉛字疑作飴與字疑作為之𩔖朱子所自校者亦祗六七處其餘每節之下隨文詮釋實皆箋註之體不盡訂正文字乃以考異為名未喻其㫖䟦末自署空同道士鄒訢葢以鄒本邾國其後去邑而為朱故以寓姓禮記鄭氏註謂訢當作熹又集韻熹虚其切訢亦虚其切故以寓名殆以䆒心丹訣非儒者之本務故託諸廋詞歟考朱子語録論參同契諸條頗為詳盡年譜亦載有慶元三年蔡元定将編管道州與朱子㑹宿寒泉精舍夜論參同契一事文集又有答蔡季通書曰參同契更無縫隙亦無心思量但望他日為劉安之雞犬耳云云葢遭逢世難不得已而託諸神仙殆與韓愈謫潮州時邀大顛同游之意相𩔖故}
