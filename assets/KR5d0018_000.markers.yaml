  - {type: variant, offset: 878, length: 870, content: 其間所謂易也先天之位乾南坤北離東坎西是也故其象如垣郭之形其升降則如車軸之貫轂以運輪一下而一上也轂車輪之心外實而持輻内空以受軸者也軸車下横木兩頭貫轂而受轄者也牝牡四卦以爲橐籥牝牡謂配合之四卦震兊巽艮是也橐鞲囊籥其管也蓋納甲之法乾爲望坤爲晦而坎離升降於其間震爲生明而兊爲上弦巽爲生魄而艮爲下弦如鼓鞲之有緩急也朱子曰邵子云乾坤定上下之位坎離列左右之門參同契首卦位鋪排都只一般覆冒陰陽之道猶工御者執銜轡準繩墨隨軌轍處中以制外數在律歷紀此言人心能統陰陽運轂軸以成丹也銜轡謂所以使陰陽者繩墨謂火候軌轍指其升降之所由中謂心外謂氣數即下文六十卦之火候也月節有五六經緯奉日使兼并爲六十剛柔有表裏月以五日爲一節六節爲一周兼晝夜爲六十以配六十卦晝剛夜柔剛裏柔表蓋六十四卦除乾坤坎離爲爐竈丹藥所用以爲火候者止六十卦也朔旦屯直事至暮蒙當受晝夜各一卦用之如次序此六十卦之凡例一月而一周蓋逐日用功時刻之早晚也旣未至晦爽終則復更始日辰爲期度動靜有早晚旣未謂晦日之卦朝旣濟暮未濟也爽謂生明之時春夏據内體從子到辰巳秋冬當外用自午訖戌亥春夏謂朝秋冬謂暮内體謂前卦外用謂後卦此亦六十卦之凡例後篇屯以子申蒙用寅戌乃以納甲之法盡發之大率一日所用子午卯酉四時而已賞罰應春秋昏明順寒暑爻辭有仁義隨時發喜怒如是應四時五行得其序此言朝暮用功有不同之處未詳其說天地設位而易行乎其中矣天地者乾坤也設位者列陰陽配合之位也易謂坎離坎離者乾坤二用此引易而釋之以明乾坤坎離之用言乾上而坤下離降而坎升也乾坤二用謂乾用九坤用六九老陽六老陰也二用無爻位周流行六虚往來旣不定上下亦无常幽潛淪匿升降於中包囊萬物爲道紀綱以無制有器用者空故推消息坎離没亡乾坤二卦六爻九六各有定位唯用九用六无定位而六爻之九六即此九六之周流升降也納甲之法乾納甲壬坤納乙癸震納庚巽納辛艮納丙兊納丁皆有定位而坎納戊離納己無定位蓋六卦之陰陽即坎離中爻之周流升降也故以此之无制彼之有知器有形而其用乃在其形之空處蓋用老子所謂埏埴以爲器當其无有器之用之語也消息謂自坤之息歷震兊而極於乾自乾而消歷巽艮而極於坤也没亡謂無位也後章用九翩翩爲易宗祖一節亦是此, WYG: 嘗留}
