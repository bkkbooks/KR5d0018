  - {type: variant, offset: 594, length: 283, content: 用參同以坎離爲藥餘者以爲火候邵子發明先天圖圖傳自希夷希夷又自有所傳蓋方士技術用以修鍊參同契所言是也參同契文章極好蓋後漢之能文者爲之其用字皆根據古書非今人所能解以故皆爲人妄解世間本子極多其中有云千周燦彬彬兮萬變將可覩神明或告人兮魂靈忽自悟言誦之久則文義要訣自見須溪劉氏曰古書惟參同契似先秦文上篇乾坤者易之門户衆卦之父母乾坤以宇内言之則乾天在上坤地在下而陰陽變化萬物終始皆在其間以人身言之則乾陽在上坤陰在下而一身之陰陽萬物變化終始皆在其間此乾坤所以爲易之門户衆卦之父母也凡言易者皆指陰陽變化而言在人則所謂金丹大藥者也然則乾坤其爐鼎歟坎離匡郭運轂正軸乾坤位乎上下而坎離升降, WYG: 免}
