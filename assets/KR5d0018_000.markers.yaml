  - {type: variant, offset: 4778, length: 1206, content: 服食之壽命得長久土遊於四季守界定規矩金砂入五内霧散若風雨薰蒸達四肢顔色悅澤好髪白更生黑齒落出舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰眞人此言内丹而言入口未詳其㫖餘見後章馳入赤色門下胡粉投火中色壞還爲鉛冰雪得温湯解釋成太玄金以砂爲主禀和於水銀變化由其眞終始自相因此皆以同類相變爲譬也欲作服食僊宜以同類者植禾當以粟覆雞用其子以類輔自然物成易陶冶魚目豈爲珠蓬蒿不成檟類同者相從事乖不成寳是以燕雀不生鳳狐兔不乳馬水流不炎上火動不潤下又以異類不能相成反覆明之世間多學士高妙負良才邂逅不遭值耗火亡貨財據按依文說妄以意爲之端緒无因縁度量失操持擣治羌石膽雲母及礜磁硫黄燒豫章泥汞相鍊治鼓下五石銅以之爲輔樞雜性不同種安肯合體居千舉必萬敗欲黠反成癡穉年至白首中道生狐疑背道守迷路出正入邪蹊管窺不廣見難以揆方來此言爲外丹者藥非同類不能成寳若夫至聖不過伏羲畫八卦效天圖文王帝之宗結體演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更御時優劣有步驟功德不相殊制作有所踵推度審分銖有形易忖量无兆難慮謀作事令可法爲世定詩書素无前識資因師覺悟之皓若褰帷帳瞋目登高臺言三聖迭興事有優劣蓋伏羲法天文王踵羲夫子踵文有形者易制无形者難及也因自言因師以悟此理也詩書兩句未詳火記六百篇所趣等不殊文字鄭重說世人不熟思尋度其原流幽明本共居竊待賢者談曷敢輕爲書結舌欲不語絶道獲罪誅寫情寄竹帛恐泄天之符猶豫增歎息俛仰綴斯愚陶冶有法度未忍悉陳敷略述其紀綱枝條見扶疎火記六百篇蓋古書今亡未可知以金爲隄防水火乃優游金數十有五水數亦如之臨爐定銖兩五分水有餘二者以爲眞金重如本初其三遂不入火二與之俱二物相含受變化狀若神下有太陽氣伏蒸須臾間先液而後凝號曰黄輿焉此言丹之第一變也金水並見上入一作火據下文三物即當作火然又云下有太陽氣則似只是二物恐當作八而三亦當作二耳此是金水數皆十五而五分其水只用其二蓋十五之六也其三則十五之九也水二一作火二與上水火下三物相應但上无火之銖兩下又有太陽字則又未必然也二物相含受即陰陽坎離之交三物之誤甚明歲月將欲訖毁性傷壽年形體爲灰土狀若明窓塵此似第二變也擣治并合之馳入赤色門固塞其際會務令致完堅炎火張於下晝夜聲正勤始文使可修終竟武乃陳候視加謹愼審察調寒温周旋十二節節盡更親觀氣索命將絶休死亡魄魂色轉更爲紫赫然成還丹粉提以一丸刀圭最爲神此第三變也擣治并合此當别有所作用赤色門謂口也液凝灰土理須自見蓋吐出而鍊治之復吞納也炎火即所謂太陽氣聲正勤後章亦言嗷嗷聲正悲如嬰兒慕母是也修疑作脩字唐人兩字多互見氣索命絶又是前章火滅金復之意粉提刀圭未詳推演五行數較約而不煩舉水以激火奄然滅光榮日月相激薄常存晦朔間水盛坎侵陽火衰離晝昏陰陽相飲食交感道自然名者以定情宇者縁性言金來歸性初乃得稱還丹此解上文還丹得名之義因火滅而金復也吾不敢虚說放效聖人文古記題龍虎黄帝美金華淮南鍊秋石王陽加黄芽賢者能持行不肖母與俱古今道由一對談吐所謀學者加勉力留念深思惟至要言甚露昭昭不我欺周易參同契, WYG: 毅總校官臣陸費墀}
