body:
  text: 讚序參同契者詞陋而道大言微而㫖深列五帝以建業配三皇而立政若君臣差殊上下無凖序以為政不至太平服食其法未能長生學以養性又不延年至于剖析隂陽合其銖兩日月弦望八卦成象男女施化剛柔動静米鹽分判以經為證用意健矣故為立法以傳後賢惟曉大象必得長生强已益身為此道者重加意焉此似註序後人所作今注亡而序存耳立法即立注字轉寫誤耳附朱子曰或云後序或云魏君讚詞其文意乃是注之後序彭曉序云魏君密示青州徐從事令箋注徐𨼆名而注之恐此是徐君語也其注則不復存矣右周易參同契魏伯陽所作魏君後漢人篇題葢放緯書之目詞韻皆古奥雅難通讀者淺聞妄輒更改故比他書尤多舛誤今合諸本更相讐正其間尚多疑晦未能盡祛姑據所知寫成定本其諸同異因悉存之以備參訂云空同道士鄒訢附按鄒訢二字朱子借之託名也鄒本春秋邾子之國樂記天地訢合鄭氏註云訢當作熹附朱子曰按魏書首言乾坤坎離四卦槖籥之外其次即言屯蒙六十卦以見一日用功之早晚又次即言納甲六卦以見一日用功之進退又次即言十二辟卦以分納甲六卦而兩之葢内以詳理月節而外以兼統嵗功其所取于易以為説者如是而已初未嘗及夫三百八十四爻也今世所傳火候之法乃以三百八十四爻為一周天之數以一爻直一日而爻多日少則不免去其四卦二十四爻以俟二十四氣之至而漸加焉已非出于自然脗合之度矣且當日所用之爻或隂或陽亦無次第不知功夫有何分别又況一日之間已周三百六十之數而其一氣所加僅得一爻多少重輕不相權凖又此二十四者進増微漸退減暴疾無復往來循環之勢恐亦後人以意為之未必魏君之本指也逆意此書大要在于坎離二字若于此處得其綱領則功夫之節度魏君所不言者自可以意為之但使不失其早晚之期進退之節便可用功不必一一拘舊説故今推得䇿數一法似亦整齊其與爻數之法雖皆魏君所不言然此為粗有理也葢月以十二卦分之卦得二日有半各以本卦之爻行本卦之䇿自八月觀卦以後至正月泰卦陽用少二十八䇿隂用老二十四䇿自四月大壯以後至七月否卦陽用老三十六䇿隂用少二十二䇿陽即注意流行隂即放於𠖇寂一爻已足即一開闢之氣其休息之十二卦周即為一日之功十二卦周即為一嵗之運反覆循環無有餘欠其數已具圖欲與季通講之未及寫寄而季通死矣附按朱子于昔所著書成家者未嘗隨聲附影輕附于聖人之徒如麻衣易以為戴師愈所作闗子明易以為阮偽作其重于傳信如此獨于參同契無一語疑似且其解易得于邵子為多而其言曰邵子得于希夷希夷源流自參同契是以從上處之也嘗曰眼中見得了了如此但無下手處又曰今始識頭緒未得其作料孔穴慶元丁已季通編置道州將别留宿寒泉相與訂正參同契終夕不寐嗚呼是師是弟子處憂患不亂如此而獨于參同拳拳焉脱屣世外之意決矣明年季通卒又得所謂䇿數之法恨不得與季通講之又二年而先生卒矣然則參同隂符二書自其師弟子始而二書不戾于聖人可信故成書以之列太極先天之後豈有二乎哉周易參同契考異
