body:
  text: 周易參同契考異宋朱子撰五代彭曉解義序曰魏伯陽㑹稽上虞人修真潛默養志虚無博贍文詞通諸緯候得古人龍虎經盡獲妙㫖乃約周易譔參同契三篇復作補塞遺脱一篇所述多以寓言借事𨼆顯異文密示青州徐從事徐乃𨼆名而注之桓帝時公復傳授與同郡淳于叔通遂行於世參雜也同通也契合也謂與周易理通而義合也其書假借君臣以彰内外叙其離坎直指汞列以乾坤奠量鼎器明之父母保以始終合以夫妻拘其交媾譬諸男女顯以滋生析以隂陽導之反復示之晦朔通以降騰配以卦爻形于變化隨之斗柄取以周星分以晨昏昭諸刻漏莫不託易象而論之故明周易參同契云附按參同契注本凡一十九部三十一卷其目載夾漈鄭氏藝文略彭曉本最傳然分三卷為九十章以應陽九之數歌鼎器一篇以應水一之數其傅㑹𩔖如此葢效河上公分老子為上經下經八十一章而其實非也鮑氏云彭本為近世淺學妄更秘館所藏民間所録差誤衍脱莫知適從朱子考辨正文引證依據其本始定今不敢又贅附諸說云附朱子曰參同契本不為明易姑借此納甲之法以寓其行持進退之候異時每欲學之而不得其傳無下手處不敢輕議然其所言納甲之法則今所傳京房占法見于火珠林者是其遺法所云甲乙丙丁庚辛者乃以月之昏旦出沒言之非以分六卦之方也此雖非為明易而設然易中無所不有茍其言自成一家可推而通則亦無害于易伯陽參同契恐希夷之學有些自其源流先天圖與納音相應蔡季通言與參同契合以圖觀之坤復之間為晦震為初三一陽生八日為兌月上弦十五日為乾十八日為㢲一陰生二十三日為艮月下弦坎離為日月故不用參同以坎離為藥餘者以為火候邵子發明先天圖圖傳自希夷希夷又自有所傳葢方士技術用以修煉參同契所言是也參同契文章極好葢後漢之能文者為之其用字皆根據古書非今人所能解以故皆為人妄解世間本子極多其中有云千周燦彬彬兮萬遍將可睹神明或告人兮魂靈忽自悟言誦之久則文義要訣自見須溪劉氏曰古書惟參同契似先秦文上篇乾坤者易之門户衆卦之父母乾坤以宇内言之則乾天在上坤地在下而陰陽變化萬物終始皆在其間以人身言之則乾陽在上坤隂在下而一身之隂陽萬物變化終始皆在其間此乾坤所以為易之門户衆卦之父母也凡言易者皆指陰陽變化而言在人則所謂金丹大藥者也然則乾坤其爐鼎歟坎離匡郭運轂正軸乾坤位乎上下而坎離升降于其間所謂易也先天之位乾南坤北離東坎西是也故其象如垣郭之形其升降則如車軸之貫轂以運輪一下而一上也轂車輪之心外實而持輻内空以受軸者也軸車下横木兩頭貫轂而受轄者也牝牡四卦以為槖籥牝牡謂配合之四卦震兑㢲艮是也槖鞴囊籥其管也葢納甲之法乾為望坤為晦而坎離升降于其間震為生明而兑為上弦㢲為生魄而艮為下弦如鼓鞴之有緩急也附朱子曰邵子云乾坤定上下之位坎離列左右之門參同契首卦位鋪排都只一般覆冒隂陽之道猶工御者執銜轡凖繩墨隨軌轍處中以制外數在律厯紀此言人心能統隂陽運轂軸以成丹也銜轡謂所以使隂陽者繩墨謂火候軌轍指其升降之所由中謂心外謂氣數即下文六十卦之火候也月節有五六經緯奉日使兼並為六十剛柔有表裏月以五日為一節六節為一周兼晝夜為六十以配六十卦晝剛夜柔剛裏柔表葢六十四卦除乾坤坎離為爐竈丹藥所用以為火侯者止六十卦也朔旦屯直事至暮蒙當受晝夜各一卦用之如次序此六十卦之凡例一月而一周葢逐日用功時刻之早晚也既未至晦爽終則復更始日辰為期度動静有早晚既未謂晦日之卦朝既濟莫未濟也爽謂生明之時春夏據内體從子到辰巳秋冬當外用自午訖戌亥春夏為朝秋冬為莫内體謂前卦外用謂後卦此亦六十卦之凡例後篇屯以子申蒙用寅戌乃以納甲之法盡發之大率一日所用子午夘酉四時而已賞罰應春秋昏明順寒暑爻辭有仁義隨時發喜怒如是應四時五行得其序此言朝暮用功有不同之處未詳其説天地設位而易行乎其中矣天地者乾坤也設位者列隂陽配合之位也易謂坎離坎離者乾坤二用此引易而釋之以明乾坤坎離之用言乾上而坤下離降而坎升也乾坤二用謂乾用九坤用六九老陽六老隂也二用無爻位周流行六虚往來既不定上下亦無常幽潛淪匿升降于中包囊萬物為道紀綱以無制有器用者空故推消息坎離沒亡乾坤二卦六爻九六各有定位唯用九用六無定位而六爻之九六即此九六之周流升降也納甲之法乾納甲壬坤納乙癸震納庚㢲納辛艮納丙兌納丁皆有定位而坎納戊離納已無定位葢六卦之隂陽即坎離中爻之周流升降也故以此之無制彼之有知器有形而其用乃在其形之空處葢用老子所謂挻埴以為器當其無有器之用之語也消息謂自坤之息厯震兌而極于乾自乾而消厯㢲艮而極于坤也沒亡謂無位也後章用九翩翩為易宗祖一節亦是此意也附朱子曰或問參同本是龍虎上經果否曰不然葢是後人見伯陽傳有龍虎上經一句遂偽作此經大槩皆是括參同之語而為之也其間有説錯了處如二用云者用九用六九六亦坎離也六虚者即乾坤之初二三四五上六爻位也言二用雖無爻位而常周流乎乾坤六爻之間猶人之精氣上下周流乎一身而無定所也龍虎經却錯説作虚危去葢討頭不見牽合一字來説附按彭氏以為魏公得古文龍虎經而譔參同契朱子以為經乃後人偽作今考參同契中有古文記龍虎之文往往古有其文如火記之𩔖特恐非今所傳者耳鮑氏云此乃三墳書狐首經之比未可知也附又按金碧古文龍虎上經差簡于參同契然其語次布置與契不甚相逺而加整焉末云火記不虚作亦契中語也然則火記又參同之所出歟言不茍造論不虚生引驗見効挍度神明推𩔖結字原理為徵坎戊月精離已日光日月為易剛柔相當土王四季羅絡始終青赤白黑各居一方皆稟中宫戊己之功此以造字之法明坎月離日之合而為易也葢坎戊離已皆居中宫土位而四方四行皆稟其氣易者象也懸象著明莫大乎日月窮神以知化陽往則隂來輻湊而輪轉出入更卷舒此總明日月為易之意下乃詳言其法與一月之火候晦至朔旦震來受符當斯之時天地媾其精日月相撢持雄陽播𤣥施雌隂化黄包混沌相交接權輿樹根基經營養鄞鄂凝神以成軀衆夫蹈以出蠕動莫不由于是仲尼贊洪濛乾坤德洞虚稽古稱元皇闗睢建始初冠婚氣相紐元年乃牙滋聖人不虚生上觀顯天符天符有進退詘信以應時此書之法以一月為六節分屬六卦震一兌二乾三㢲四艮五坤六每五日為一節故言朔旦則震始用事而為日月隂陽交感之初于是加修煉之功如聖人之作六經皆有所托始也此實一篇之要言而雄陽播𤣥施雌隂化黄包又一節之要處他皆以明此耳故易統天心復卦建始萌長子繼父體因母立兆基消息應鍾律升降據斗樞此又以一月為十二節以復臨泰壯夬乾姤遯否觀剥坤為序每二日半為一節復即前六節震卦之内體也長子震也父乾也母坤也下章云朔旦為復三日出為爽震受庚西方八日兌受丁上弦平如繩十五乾體就盛滿甲東方三日第一節之中月生明之時也葢始受一陽之光而昏見于西方庚地也八日第二節之中月上弦之時葢受二陽之光而昏見于南方丁地也十五日第三節之中月既望之時全受日光盛滿而昏見于東方之甲地也蟾蜍與兎魄日月无雙明蟾蜍眡卦節兎者吐生光此言望夕之月全受日光而借蟾為瞻借兎為吐也七八道已訖屈折低下降十六轉受統㢲辛見平明艮直于丙南下弦二十三坤乙三十日東北喪其明節盡相禪與繼體復生龍壬癸配甲乙乾坤括始終七八謂十五日也十六日謂第四節之始也始生下一隂為㢲而成魄以平旦而沒于西方辛地也二十三日第五節之中復生中一隂為艮而下弦以平旦而沒于南方丙地也三十日第六節之終全變三陽而光盡體伏于東北借易朋字作明字也一月六節既盡而禪于後月長子繼父復生震卦壬配甲癸配乙皆屬乾坤括十日之始終自晦至朔旦至此一月之火候也附朱子曰一息之間便有晦朔弦望上弦者氣之方息自上而下也下弦者氣之方消自下而上也望者氣之盈也日沉于下而月圓于上也晦朔之間日月之合乎上所謂舉水以滅火金來歸性初之𩔖是也七八數十五九六亦相應四者合三十陽氣索滅藏索盡也八卦列布曜運移不失中𤣥精眇難覿推度效符證居則觀其象凖擬其形容立表以為範占候定吉凶發號順時令勿失爻動時上察河圖文下序地形流中稽于人情參同考三才動則循卦節静則因彖辭乾坤用施行天下然後治此用乾坤用九天下治也之語上言乾坤用即用九用六也治或作理葢避唐諱此下至國無害道皆以國政為喻可不慎乎御政之首管括密微闓舒布寳要道魁柄統化綱紐爻象内動吉凶外起五緯錯順應時感動四七乖戾侈離俯仰文昌總録詰責台輔百官有司各典所部日合五行精月受六律紀五六三十度度竟復更始原始要終存亡之緒或君驕佚亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法刺譏結過移主辰極受正優游任下明堂布政國無害道此皆取譬之言然其間亦有可詳味者内以養已安静虚无元本𨼆明内照形軀閉塞其兊築固靈株三光陸沉温養子珠視之不見近而易求黄中漸通理潤澤達肌膚初正則終修幹立末可持一者以掩蔽世人莫知之此乃以内事言之于經中最為要切而三光陸沉温養子珠之一言又要切之要切者前所譬御政之首魁柄綱紐正謂此也初正幹立原始而言也終修末持要終而言也一者以掩蔽言其造端之處𨼆而不章者也上德无為不以察求下德為之其用不休上閉則稱有下閉則稱无无者以奉上上有神德居此兩孔穴法金氣亦相胥此下漸難通曉今畧以意解之上德即上文所謂雌隂化黄包三光陸沉下文所謂汞白為流珠青龍與之俱所謂流珠水之母者正思慮所不及也下德即上文所謂雄陽播𤣥施温養子珠下文所謂白虎為熬樞黄土金之父者正著意用力處也閉則皆失其所宜矣下不可無故無者以奉上神德謂微妙處龍虎經作上有青龍居金氣即謂雄陽白虎也大率陽既下即隂自上矣所謂孔穴者此也鼎器歌云隂在上陽下奔此亦至要之言知白守黑神明自來白者金精黑者水基水者道樞其散各一白謂汞黑為鈆金精言其生于鈆水基能生水也白黑各一而水為道樞所謂神德者也隂陽之始𤣥含黄牙五金之主北方河車𤣥含黄牙水中有土静而有意也北方河車黑而生水也以下文考之正謂鈆耳故鈆外黑内懐金華被褐懐玉外為狂夫鈆即上文所謂金氣金為水母母𨼆子胎水者金子子藏母胞此即上文知白守黑之義真人至妙若有若无仿佛大淵乍沈乍浮退而分布各守境隅此所謂温養子珠者也望之𩔖白造之則朱鍊為表衛白裏貞居方圓徑寸混而相拘先天地生巍巍尊高旁有垣闕狀似蓬壺環匝闗閉四通踟蹰守禦密固閼絶姦邪曲閣相通以戒不虞徑寸即所謂子珠者垣闕疑即下文所謂情主營外恒為城闕者耶皆未詳其何説可以无思難以愁勞神氣滿堂莫之能留守之者昌失之者亡動静休息常與人俱是非厯藏法内視有所思履行步斗宿六甲以日辰隂道厭九一濁亂㺯𤣥胞食炁鳴腸胃吐正吸新邪晝夜不卧寐晦朔未嘗休身體以疲倦恍惚狀若癡百脈鼎沸馳不得清澄居周迴立壇宇朝暮敬祭祠鬼物見形象夢寐感慨之心懽意喜悅自謂必延期遽以夭命死腐露其形骸舉措輙有違悖逆失樞機諸術甚衆多千條有萬餘前却違黄老曲折戾九都言此道與諸旁門小法之不同不能詳解明者省厥㫖曠然知所由勤而行之夙夜不休服食三載輕舉逺游入火不焦入水不濡能存能亡長樂無憂道成德就潛伏竢時太乙乃召移居中洲功滿上昇膺籙受圖火記不虚作演易以明之偃月法鼎爐白虎為熬樞汞日為流珠青龍與之俱舉東以合西魂魄自相拘上弦兌數八下弦亦如之偃月疑前下圓後上缺狀如偃月也白虎鈆也火也氣也西也魄也陽也為熬樞言下奔而致蒸潤上行也汞日精也青龍水也東也魂也隂也上弦陽也下弦隂也附朱子曰坎離水火龍虎銘汞之屬只是互換其名其實只是精氣二者而已精水也坎也龍也汞也氣火也離也虎也鈆也其法以神運精氣結而為丹陽氣在下初成水以火煉之則凝成丹其説甚異兩弦合其精乾坤體乃成二八應一斤易道正不傾八日為兌上弦又進八日乃成乾體二十二日為艮下弦又退八日乃成坤體一本註云銖有三百八十四亦應爻之數葢一斤之銖數也自震而起至乾而滿厯㢲而消至坤而盡金入於猛火色不奪精光自開闢以來日月不虧明金不失其重日月形如常金本從月生朔旦受日符金反歸其母月晦日相包𨼆藏其匡郭沉淪於洞虚金復其故性威光鼎乃熺金即鈆也金歸其母復其故性謂斂藏不用日不照月純坤卦也熺字本作喜一本作僖今按皆無理案説文熺炎也後漢多用此字子午數合三戊已號稱五三五既和諧八石正綱紀嘑吸相貪欲佇思為夫婦黄土金之父流珠水之母水以土為鬼土填水不起朱雀為火精執平調勝負水勝火消滅俱死歸厚土三性既合㑹本性共宗祖子水一午火二數合三也戊己土其數五三五合而為八八石象也然其實但水火二物而以土為主耳土屬脾脾主意謂以意使火下而水上相呼吸也金即火也朱雀疑指心而言又意之主也此火字與前章熬字意不同别是一火也執平謂執衡司夏也此書之意大抵為以火烹水以水滅火亦如前章月受日光反歸其母之意也巨勝尚延年還丹可入口金性不敗朽故為萬物寳術士服食之夀命得長久土遊於四季守界定規矩金砂入五内霧散若風雨重烝達四肢顔色悦澤好髮白更生黑齒落出舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰真人此言内丹而言入口未詳其㫖餘見後章馳入赤色門下胡粉投火中色壊還為氷雪得温湯解釋成太𤣥金以砂為主稟和於水銀變化由其真終始自相因此皆以同𩔖相變為譬也欲作服食仙宜以同𩔖者植禾當以粟覆雞用其子以𩔖輔自然物成易陶冶魚目豈為珠蓬蒿不成檟𩔖同者相從事乖不成寳是以燕雀不生鳳狐兎不乳馬水流不炎上火動不潤下又以異𩔖不能相成反覆明之世間多學士高妙負良才邂逅不遭植耗火亡貨財據按依文説妄以意為之端緒無因縁度量失操持擣治羌石膽雲母及礜磁硫黄燒豫章泥汞相煉治鼔下五石銅以之為輔樞雜性不同種安肯合體居千舉必萬敗欲反成癡穉年至白首中道生狐疑背道守迷路出正入邪蹊管窺不廣見難以揆方來此言為外丹者藥非同𩔖不能成寳若夫至聖不過伏羲畫八卦效天圖文王帝之宗結體演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更御時優劣有步驟功德不相殊制作有所踵推度審分銖有形易忖量無兆難慮謀作事令可法為世定詩書素無前識資因師覺悟之皓若褰帷帳瞋目登高臺言三聖迭興事有優劣葢伏羲法天文王踵羲夫子踵文有形者易制無形者難及也因自言因師以悟此理也詩書兩句未詳火記六百篇所趣等不殊文字鄭重説世人不熟思尋度其源流幽明本共居竊待賢者談曷敢輕為書結舌欲不語絶道獲罪誅寫情寄竹帛恐泄天之符猶豫増歎息俯仰綴斯愚陶冶有法度未忍悉陳敷略述其紀綱枝條見扶疎火記六百篇葢古書今亡未可知以金為隄防水火仍優游金數十有五水數亦如之臨爐定銖兩五分水有餘二者以為真金重如本初其三遂不入水二與之俱三物相含受變化狀若神下有太陽炁伏烝須㬰間先液而後凝號曰黄輿焉此言丹之第一變也金水並見上入一作火據下文三物即當作火然又云下有太陽炁則似只是二物恐當作八而三亦當作二耳此是金水數皆十五而五分其水只用其二葢十五之六也其三則十五之九也水二一作火二與上水火下三物相應但上無火之銖兩下又有太陽字則又未必然也二物相含受即隂陽坎離之交三物之誤甚明嵗月將欲訖毁性傷夀年形體為灰土狀若明窓塵此是第二變也擣治并合之馳入赤色門固塞其際㑹務令致完堅炎火張於下晝夜聲正勤始文使可修終竟武乃陳候視加謹慎審察調寒温周旋十二節節盡更須親炁索命將絶休死亡魄魂色轉更為紫赫然成還丹粉提以一丸刀圭最為神此第三變也擣治并合此當别有所作用赤色門謂口也液凝灰土理須自見葢吐出而鍊治之復吞納也炎火即所謂太陽炁聲正勤後章亦言嗷嗷聲正悲如嬰兒慕母是也脩疑作循字唐人兩事多互見氣索命絶又是前章火滅金復之意粉提刀圭未詳推演五行數較約而不煩舉水以激火奄然滅光榮日月相激薄常存晦朔間水盛坎侵陽火衰離晝昏隂陽相飲食交感道自然名者以定情字者縁性言金來歸性初乃得稱還丹此解上文還丹得名之義因火滅而金復也吾不敢虚説放效聖人文古記題龍虎黄帝美金華淮南鍊秋石王陽加黄牙賢者能持行不肖母與俱古今道由一對談吐所謀學者加勉力留念深思惟至要言甚露昭昭不我欺中篇乾剛坤柔配合相包陽稟隂受雄雌相須須以造化精氣乃舒坎離冠首光耀垂敷𤣥𠖇難測不可畫圖聖人揆度參序𤣥基四者混沌徑入虚無六十卦周張布為輿龍馬就駕明君御時和則隨從路平不邪邪道險阻傾危國家此與上篇首章相表裏君子居其室出其言善則千里之外應之謂萬乘之主處九重之室發號出令順隂陽節藏器俟時勿違卦日屯以子申蒙用寅戌餘六十卦各自有日聊陳兩象未能究悉立義設刑當仁施德逆之者凶順之者吉按厯法令至誠專密謹候日辰審察消息纎芥不正悔吝為賊二至改度乖錯委曲隆冬大暑盛夏霰雪二分縱横不應漏刻風雨不節水旱相伐蝗蟲涌沸山崩地裂天見其怪羣異旁出孝子用心感動皇極近起已口逺流殊域或以招禍或以致福或興太平或造兵革四者之來由乎胸臆動静有常奉其繩墨四時順宜與氣相得剛柔斷矣不相涉入五行守戒不妄盈縮易行周流屈伸反覆此與上篇論屯蒙朝暮内體外用相表裏葢乾納甲壬坤納乙癸震庚㢲辛坎戊離己艮丙兌丁也重卦之法乾下三爻納甲子寅辰上三爻納壬午申戌坤下三爻納乙未巳卯上三爻納癸丑亥酉震下三爻納庚子寅辰上三爻納庚午申戌㢲下三爻納辛丑亥酉上三爻納辛未己卯坎下三爻納戊寅辰午上三爻納戊申戌子離下三爻納己夘丑亥上三爻納己酉未巳艮下三爻納丙辰午申上三爻納丙戌子寅兑下三爻納丁己夘丑上三爻納丁亥酉未而内體從子至辰巳外用從午訖戌亥故朝屯則初九庚子之爻當子時六四戊申之爻當夘時暮蒙則初六戊寅之爻當午時六四戊戌之爻當酉時餘六十卦各以此法推之此再言一日之火候也晦朔之間合符行中渾沌鴻濛牝牡相從滋液潤澤施化流通天地神靈不可度量利用安身𨼆形而藏始乎東北箕斗之鄉旋而右轉嘔輪吐萌潛潭見象發散精光畢昴之上震出為徵陽炁造端初九潛龍陽以三立隂以八通故三日震動八日兌行九二見龍和平有明三五德就乾體乃成九三夕惕虧折神符盛衰漸革終還其初㢲繼其統固際操持九四或躍進退道危艮主進止不得踰時二十三日典守弦期九五飛龍天位加喜六五坤承結括終始藴養衆子世為𩔖母陽數已訖訖則復起推情合性轉而相與上九亢龍戰德於野用九翩翩為道規矩循據璇璣昇降上下周流六爻難得察睹故無常位為易宗祖此再以納甲言一月之火候也又以乾六爻納於其間以明陽氣之消息箕斗但言東北畢但言正西借天之四方以言地之四方耳非謂天之東北西方也六五恐是廿六字廿音入即二十字二十六日以後坤卦用事也用九以下與上篇乾坤二用處相表裏朔旦為復陽氣始通出入無疾立表微剛黄鐘建子兆乃滋彰播施柔暖黎蒸得常臨爐施條開路正光光耀寖進日以益長丑之大吕結正低昻仰以成泰剛柔並隆隂陽交接小往大來輻湊於寅運而趨時漸厯大壯俠列卯門榆莢墮落還歸本根刑德相負晝夜始分夬隂以退陽升而前洗濯羽翮振索宿塵乾健盛明廣被四鄰陽終於已中而相干姤始紀緒履霜最先井底寒泉午為蕤賓賔服於隂隂為主人遯去世位收斂其精懐德俟時棲遲昩𠖇否閉不通萌者不生隂伸陽詘沒陽姓名觀其權量察仲秋情任蓄微稚老枯復榮薺麥牙蘖因冒以生剥爛支體消滅其形化炁既竭亡失至神道窮則反歸乎坤元恒順地理承天布宣𤣥逺幽渺隔閡相連應度育種隂陽之原寥廓恍惚莫知其端先迷失軌後為主君無平不陂道之自然變易更盛消息相因終坤始復如循連環帝王承御千秋常存此以十二卦細分一月之火候亦通一嵗之火候也一月之法二日半為一卦復為震之坤臨為兑之坤泰為乾之坤大壯為乾之震夬為乾之兑乾為乾之乾姤為乾之㢲遯為乾之艮否為乾之坤觀為坤之㢲剥為坤之艮坤為坤之坤臨為複震大壯為複兊乾為複乾遯為複㢲觀為複艮坤為坤其推演之例以卦名律名辰名三者而言輻湊即太簇俠列即夾鍾洗濯即姑洗中即中吕昩𠖇即林伸即申任蓄即南閡即亥應即應鍾大率傅㑹假託不足深究也後為主君葢亦讀易而後得主為句其誤久矣將欲養性延命却期審思後末當慮其先人所稟軀體本一無元精雲布因氣託初隂陽為度魂魄所居陽神日魂隂神月魄魂之與魄互為室宅性主處内立置鄞鄂情主營外築垣城郭城郭完全人物乃安于斯之時情合乾坤乾動而直氣布精流坤静而翕為道舍廬剛施而退柔化以滋九還七反八歸六居男白女赤金火相拘則水定火五行之初上善若水清而無瑕道之形象真一難圖變而分布各自獨居𩔖如雞子黑白相符縱横一寸以為始初四肢五藏筋骨乃具彌厯十月脱出其胞骨弱可卷肉滑若鈆此與上篇知白相表裏言人之始生亦以隂陽交合而成今欲為丹亦由是也凡言道者皆丹之託名鈆疑是飴字以似而誤也陽燧以取火非日不生光方諸非星月安能得水漿二氣𤣥且逺感化尚相通何況近存身切在於心胸隂陽配日月水火為效徵耳目口三寳固塞勿發通真人潛深淵浮游守規中旋曲以眎覽開闔皆合同為己之軸轄動静不竭窮離氣内營衛坎乃不用聰兌合不以談希言順鴻濛三者既闗鍵緩體處空房委志歸虚無無念以為常證難以推移心專不縱横寢寐神相抱覺悟候存亡顔容寖以潤骨節益堅强辟却衆隂邪然後立正陽修之不輟休庶氣雲雨行淫淫若春澤液液象解氷從頭流達足究竟復上昇往來洞無極怫怫被容中反者道之驗弱者德之柄耘鋤宿汚細微得調暢濁者清之路昏久則昭明此一節乃涵養本原工夫尤為要切附朱子曰離氣内營衛嘗見前輩讀内為納其説是也世人好小術不審道淺深棄正從邪徑欲速閼不通猶盲者不任杖聾者聽宫商沒水捕雉兎登山索魚龍植麥欲穫黍運規以求方竭力勞精神終年無見功欲知服食法事約而不煩太陽流珠常欲去人卒得金華轉而相因化為白液凝而至堅金華先倡有頃之間解化為水馬齒闌干陽乃往和情性自然迫促時隂拘畜禁門慈母育養孝子報恩嚴父施令教飭子孫五行錯王相据以生火性銷金金伐木榮三五與一天地至精可以口訣難以書傳子當右轉午乃東旋夘酉界隔主定二名龍呼於虎虎吸龍精兩相飲食俱相貪便逐相銜嚥咀嚼相吞熒惑守西太白經天殺氣所臨何有不傾狸犬守䑕鳥雀畏鸇各有其功何敢有聲不得其理難為妄言竭殫家産妻子飢貧自古及今好者億人訖不諧遇希有能成廣求名樂與道乖殊如審遭逢睹其端緒以𩔖相況揆物終始五行相克更為父母母含滋液父主稟與凝精流形金石不朽審專不泄得為成道言學小術者勞而無功得此法者約而不煩太陽以下與前篇知白熬樞黄輿等章相表裏五行相生母子之恩也火金相克嚴父之令也三五謂火金木五皆稟土氣也一説謂三五即前篇子午戊巳也一未詳所指或曰與當作為下篇三五并與一亦放此東疑當作左此言隂陽定位也龍虎六句母子之恩也熒惑大白以下八句嚴父之令也不得其理廣求名藥為外丹者也以𩔖相況如前篇言八石正綱紀之𩔖也立竿見影呼谷傳響豈不靈哉天地至象若以野葛一寸巴豆一兩入喉輒僵不得俛仰當此之時雖周文揲蓍孔丘占象扁鵲操鍼巫咸叩鼓安能令蘇復起馳走河上姹女靈而最神得火則飛不見埃塵鬼𨼆龍匿莫知所存將欲制之黄牙為根物無隂陽違天背原肥雞自卵其雛不全夫何故乎配合未連三五不交剛柔離分施化之精天地自然猶火動而炎上水流而潤下非有師導使其然者資始統政不可復改觀夫雌雄交媾之時剛柔相結而不可解得其節符非有工巧以制御之若男生而伏女偃其軀稟乎胞胎受氣元初非徒生時著而見之及其死也亦復效之此非父母教令其然本在交媾定制始先坎男為月離女為日日以施德月以舒光月受日化體不虧傷陽失其契隂侵其明朔晦薄蝕奄冒相包陽消其形隂凌災生男女相須含吐以滋雄雌交雜以𩔖相求金化為水水性周章火化為土水不得行故男動外施女静内藏溢度過節為女所拘魄以撿魂不得淫奢不寒不暑進退合時各得其和俱吐證符以毒藥能殺人為黄牙能制姹女之譬外丹即謂丹砂此未詳何所指也物無隂陽以下皆物理明為此法者當隂陽交合為本也丹砂木精得金乃并金水合處木火為侣四者混沌列為龍虎龍陽數竒虎隂數偶肝青為父肺白為母腎黑為子脾黄為祖三物一家都歸戊巳剛柔迭興更厯分部龍西虎東建緯卯酉刑德並㑹相見懽喜刑主伏殺德主生起二月榆死魁臨子夘八月麥生天罡據酉子南午北互為綱紀九一之數終則復始含元抱真播精於子闗闗睢鳩在河之洲窈窕淑女君子好逑雄不獨處雌不孤居𤣥武龜蛇盤虯相扶以明牝牡畢竟相胥假使二女共室顔色甚姝令蘇秦通言張儀結媒發辨利舌奮舒美辭推心調諧使為夫妻弊髮腐齒終不相知若藥物非種名𩔖不同分劑參差失其紀綱雖黄帝臨爐太一降坐八公擣鍊淮南執火立宇崇壇玉為階陛麟脯鳳腊把籍長跪禱祝神祗請哀諸鬼沐浴齋戒冀有所望亦猶和膠脯釜以茵塗瘡去冷加氷除熱用湯飛龜舞蛇愈見乖張丹砂木精得金乃并即上章姹女黄牙之意心赤脾黄二章諸本無之未詳孰是龍虎子午交錯方位闗闗以下又以二女明藥物之非種下篇惟昔聖賢懐𤣥抱真服鍊九鼎化跡𨼆淪含精養神通德三元精液湊理筋骨緻堅衆邪辟除正氣常存累積長久變形而仙憂憫後生好道之倫隨傍風采指畫古文著為圖籍開示後昆露見枝條𨼆藏本根託號諸石覆冒衆文學者得之韞櫝終身子繼父業孫踵祖先傳世迷惑竟無見聞遂使宦者不遂農夫失耘商人棄貨志士家貧吾甚傷之定録斯文字約易思事省不煩披列其條實核可觀分兩有數因而相循故為亂辭孔竅其門智者審思以意參馬言昔之仙者著書示人而不明言其事託名諸石為身内隂陽之號故學者多失其指今著此書省約易曉仍恐漏泄故多謬亂之辭而孔竅其門也其下歌辭又撮一書大指云附按亂辭如離騷之亂曰也下文可見法象莫大乎天地兮𤣥溝數萬里河鼓臨星紀兮人民皆驚駭晷景妄前却兮九年被凶咎皇上覽眎之兮王者退自改闗鍵有低昻兮害炁遂奔走江淮之枯竭兮水流注於海此一節言水溢之咎王者能自改則害氣息而水土平矣𤣥溝葢謂天漢河鼓星名星紀丑位未詳其説九年謂洪水闗鍵低昻謂隂陽升降也害氣災害之氣以人身取譬而言亦為水火不既濟之象附朱子曰𤣥溝害氣恐未是説人身内事方是設譬之辭王莽傳曰害氣将究矣葢上文説洪水為災而王者能改故害氣去而洪水平也害訛作周又訛作固後人遂妄改為精而増而字皆非是然因周字可見其為害字葢篆𨽻文皆相似也天地之雌雄兮徘徊子與午寅申隂陽祖兮出入復終始循斗而招搖兮執衡定元紀升熬于甑山兮炎火張設下白虎倡導前兮蒼液和於后附朱子曰虎一作礜一作礬按三字皆假名但下句云蒼液即此合作礜與礬而前有礜磁之文即作礜為得然下句又云朱烏及再列三獸之名位則此當為虎而液亦當為龍矣倡導前即前所謂熬樞下文云和于後即此似皆指有情之物作龍虎為當也此一節又是以火烹水以水㓕火金水相合復還本初之意朱鳥翺翔戲兮飛揚色五采遭遇網羅施兮壓止不得舉嗷嗷聲甚悲兮如嬰兒慕母顛倒就湯鑊兮摧折傷毛羽漏刻未過半兮龍鱗狎獵起五色象炫耀兮變化無常主潏潏鼎沸馳兮暴涌不休止雜遝重疊累兮犬牙相錯拒形如仲冬氷兮闌干吐鍾乳崔嵬以雜厠兮兼積相支柱隂陽得其配兮淡泊自相守青龍處房六兮春華震東夘白虎在七兮秋芒兊西酉朱雀在張二兮正陽離南午三者俱來朝兮家屬為親侣本之但二物兮末乃為三五三五并與一兮都集歸二所治之如上科兮日數亦取甫先白而後黄兮赤色通表裏名曰第一鼎兮食如大黍米此復總言還丹之法撮其精要子午謂乾坤寅申謂坎離升熬即所謂熬樞伏蒸者白虎金青龍水朱雀火以金生水水而滅火以成丹其形如此前所謂先液後凝馬齒闌干是也嗷嗷聲正悲亦前所謂晝夜聲正勤者隂陽得配淡泊相守即所謂各守境隅各自獨居者房東方七宿之中六其度數也七張二放此二物謂隂陽三五謂火金木皆稟土氣也并與一詳其文意與似當作為二所取甫皆未詳其文義自然之所為兮非有邪偽道山澤氣相烝兮興雲而為雨泥竭乃成塵兮火滅自為土若蘗染為黄兮似藍成緑組皮革煮為膠兮麴糵化為酒同𩔖易施功兮非種難為巧譬上事惟斯之妙術兮審諦不誑語傳於億代後兮昭然而可考煥若星經漢兮昺如水宗海思之務令熟兮反復眎上下千周燦彬彬兮萬徧將可覩神明或告人兮魂靈忽自悟探端索其緒兮必得其門户天道無適莫兮常傳與賢者言其書指著明學者但能讀千周萬徧則當自曉悟如神明告之也董遇云讀書千徧其義自見又曰思之思之又重思之思之不通鬼神將教之非鬼神之力也精神之極也非妄語也五相𩔖此篇五章一參同二太易三象彼四鄶國五委時參同契者敷陳梗槩不能純一纎微未備缺畧髣髴今更撰録補塞遺脱潤色幽深鉤援相逮㫖意等齊所趣不悖故復作此命五相𩔖則太易之情性盡矣太易情性各如其度黄老用究較而可御爐火之事真有所據三道由一俱出徑路枝莖華葉果實垂布正在根株不失其素誠心所言審而不誤象彼仲冬節竹木皆摧傷佐陽詰商旅人君深自藏象時順節令閉口不用談天道甚浩曠太𤣥無形容虚寂不可覩匡郭以消亡謬誤失事緒言還自敗傷别序斯四象以曉後生盲此言晦朔之間渾沌鴻濛𨼆形而藏之時也太𤣥無形容上善若水真一難圖之象也四象未詳鄶國鄙夫幽谷朽生附朱子曰魏君實上虞人當作㑹稽或是魏𨼆語作鄶挾懐朴素不落權榮棲遲僻陋忽略令名執守恬淡希時安平逺客燕間乃撰斯文歌叙大易三聖遺言察其㫖趣一統共倫務在順理宣耀精神神化流通四海和平表以為厯萬世可循序以御政行之不煩引内養性黄老自然含德之厚歸根返元近在我心不離已身抱一母舍可以長存配以服食雄雌設陳挺除武都八石棄捐審用成功世俗所珍羅列三條枝莖相連同出異名皆由一門非徒累句諧偶斯文殆有其真礫硌可觀使余敷偽却被贅愆命參同契微覽其端辭寡意大後嗣宜遵委時去害依托丘山循遊寥廓與鬼為隣化形而仙淪寂無聲百世一下遨遊人間陳敷羽翮東西南傾湯遭厄際水旱隔并柯葉萎黄失其華榮吉人相乘負安穏可長生鼎器歌圓三五寸一分口四八兩寸唇長二尺厚薄匀腹三齊坐垂温二尺或作尺二彭曉解作二尺三齊一作齊三按齊即臍字隂在上陽下奔此二句是要法首尾武中間文隂火白黄芽鈆兩七竅輔翼人膽理腦定升𤣥子處中得安存來去遊不出門漸成大性情純却歸一還本原至一周甚辛勤密防䕶莫迷昏途路逺極幽𤣥若達此㑹乾坤樂道者尋其根審五行定銖分諦思之不須論深藏守莫傳文御白鶴兮駕龍鱗遊太虚兮謁仙君録天圖兮號真人周易參同契考異
