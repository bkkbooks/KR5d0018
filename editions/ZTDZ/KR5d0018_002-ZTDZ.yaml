front:
  text: 周易參同契卷下
  hash: sha256:13eb4a737cb49e188ba5e14b06d1a7a1b1ab6f81a9e511fe4e4e4a48423554ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0018_SJB_002-200128c, image: sjb/20/200128c.png}
body:
  text: 廬陵後學黄瑞節附録下篇惟昔聖賢懷玄抱眞服鍊九鼎化跡隱淪含精養神通德三元精液湊理筋骨緻堅衆邪辟除正氣常存累積長久變形而仙憂憫後生好道之倫隨傍風采指畫古文著爲圖籍開示後昆露見枝條隱藏本根託號諸石覆冒衆文學者得之韞櫝終身子繼父業孫踵祖先傳世迷惑竟無見聞遂使宦者不遂農夫失芸商人棄貨志士家貧吾甚傷之定録斯文宇約易思事省不煩披列其條實核可觀分兩有數因而相循故爲亂辭孔竅其門智者審思以意參焉言昔之仙者著書示人而不明言其事託名諸石爲身内陰陽之號故學者多失其指今著此書省約易曉仍恐漏泄故多謬亂之辭而孔竅其門也其下歌辭又撮一書大指云按亂辭如離騷之亂曰也下文可見法象莫大乎天地兮玄溝數萬里河鼓臨星紀兮人民皆驚駭晷景妄前却兮九年被凶咎皇上覽視之兮王者退自改關鍵有低昂兮害氣遂奔走江淮之枯竭兮水流注於海此一節言水溢之咎王者能自改則害氣息而水土平矣玄溝蓋謂天漢河鼓星名星紀丑位未詳其說九年謂洪水關鍵低昂謂陰陽升降也害氣災害之氣以人身取譬而言亦爲水火不旣濟之象朱子曰玄溝害氣恐未是說人身内事方是設譬之辭王莽傳曰害氣將究矣蓋上文說洪水爲灾而王者能改故害氣去而洪水平也害訛作周又訛作固後人遂妄攺爲精而增而字皆非是然因周字可見其爲害字蓋篆隸文皆相似也天地之雌雄兮徘徊子與午寅申陰陽祖兮出入復終始循斗而招揺兮執衡定元紀升熬於甑山兮炎火張設下白虎倡導前兮蒼液和於后朱子曰虎一作礜一作礬按三字皆假名但下句云蒼液即此合作礜與礬而前有礜磁之文即作礜爲得然下句又云朱鳥及再列三獸之名位則此當爲虎而液亦當爲龍矣倡導前即前所謂熬樞下文云和於後即此似皆指有情之物作龍虎爲當也此一節又是以火烹水以水滅火金水相合復還本初之意朱鳥翱翔戲兮飛揚色五采遭遇網羅施兮壓止不得舉嗷嗷聲甚悲兮如嬰兒慕母顚倒就湯鑊兮摧折傷毛羽漏刻未過半兮龍鱗狎獵起五色象炫耀兮變化无常主潏潏鼎沸馳兮暴涌不休止雜遝重疊累兮犬牙相錯拒形如仲冬冰兮闌干吐鍾乳崔嵬以雜厠兮兼積相支柱陰陽得其配兮淡泊自相守青龍處房六兮春華震東卯白虎在昴七兮秋芒兌西酉朱雀在張二兮正陽離南午三者俱來朝兮家屬爲親侣本之但二物兮未乃爲三五三五并爲一兮都集歸二所治之如上科兮日數亦取甫先白而後黄兮赤色通表裏名曰第一鼎兮食如大黍米此復緫言還丹之法撮其精要子午謂乾坤寅申謂坎離升熬即所謂熬樞伏蒸者白虎金青龍水朱雀火以金生水水而滅火以成丹其形如此前所謂先液後凝馬齒䦨干是也嗷嗷聲正悲亦前所謂晝夜聲正勤者陰陽得配淡泊相守即所謂各守境隅各自獨居者房東方七宿之中六其度數也昴七張二放此二物謂陰陽三五謂火金木皆禀土氣也并與一詳其文意與似當作爲二所取甫皆未詳其文義自然之所爲兮非有邪僞道山澤氣相蒸兮興雲而爲雨泥竭乃成塵兮火滅自爲土若蘖染爲黄兮似藍成緑組皮革煑爲膠兮麴蘖化爲酒同類易施功兮非種難爲巧譬上事惟斯之妙術兮審諦不誑語傳於億代後兮昭然而可考煥若星經漢兮昺如水宗海思之務令熟兮反復眎上下千周燦彬彬兮萬遍將可覩神明或告人兮魂靈忽自悟探端索其緒兮必得其門户天道无適莫兮常傳與賢者言其書指著明學者但能讀千周萬遍則當自曉悟如神明告之也董遇云讀書千遍其義自見又曰思之思之又重思之思之不通鬼神將教之非鬼神之力也精神之極也非妄語也五相類此篇五章一參同二太易三象彼四鄶圖五委時參同契者敷陳梗槩不能純一纖微未備缺略髣髴今更撰録補塞遺脱潤色幽深鉤援相逮㫖意等齊所趣不悖故復作此命五相類則太易之情性盡矣太易情性各如其度黄老用究較而可御爐火之事眞有所據三道由一俱出徑路枝莖華葉果實垂布正在根株不失其素誠心所言審而不誤象彼仲冬節竹木皆催傷佐陽詰商旅人君深自藏象時順節令閉口不用談天道甚浩曠太玄无形容虚寂不可覩匡郭以消亡謬誤失事緒言還自敗傷别序斯四象以曉後生盲此言晦朔之間渾沌鴻濛隱形而藏之時也太玄无形容上善若水眞一難圖之象也四象未詳鄶國鄙夫幽谷朽生朱子曰魏君實上虞人當作會稽或是魏隱語作鄶挾懷朴素不樂權榮棲遲僻陋忽略令名執守恬淡希時安平遠客燕間乃撰斯文歌叙大易三聖遺言察其所趣一統共倫務在順理宣耀精神神化流通四海和平表以爲歷萬世可循序以御政行之不煩引内養性黄老自然含德之厚歸根返元近在我心不離己身抱一毋舍可以長存配以服食雄雌設陳挺除武都八石棄捐審用成功世俗所珍羅列三條枝莖相連同出異名皆由一門非徒累句諧偶斯文殆有其眞礫硌可觀使余敷僞却被贅愆命參同契微覽其端辭寡意大後嗣宜遵委時去害依托丘山循遊寥廓與鬼爲鄰化形而仙淪寂無聲百世一下遨遊人間陳敷羽翮東西南傾湯遭厄際水旱隔并柯葉萎黄失其華榮吉人相乗負安穩可長生鼎器歌圓三五寸一分口四八兩寸唇長二尺厚薄勾腹三齊坐垂温二尺或作尺二彭曉解作二尺三齊一作齊三按齊即臍字陰在上陽下奔此二句是要法首尾武中間文陰火白黄牙鉛兩七竅輔翼人膽理腦定升玄子處中得安存來去遊不出門漸成大性情純却歸一還本原至一周甚辛勤密防護莫迷昏途路遠極幽玄若達此會乾坤樂道者尋其根審五行定銖分諦思之不須論深藏守莫傳文御白鶴兮駕龍鱗遊太虚兮謁仙君録天圖兮號眞人讚序參同契者辭陋而道大言微而㫖深列五帝以建業配三皇而立政若君臣差殊上下无準序以爲政不至太平服食其法未能長生學以養性又不延年至於剖析陰陽合其銖兩日月弦望八卦成象男女施化剛柔動靜米鹽分判以經爲證用意健矣故爲立法以傳後賢惟曉大象必得長生强己益身爲此道者重加意焉此似註序後人所作今註亡而序存耳立法即立注字轉寫誤耳朱子曰或云後序或云魏君讚辭其文意乃是註之後序彭曉序云魏君密示青州徐從事令箋註徐隱名而註之恐此是徐君語也其註則不復存矣右周易參同契魏伯陽所作魏君後漢人篇題蓋放緯書之目詞韻皆古奥雅難通讀者淺聞妄輒更改故比他書尤多舛誤今合諸本更相讎正其間尚多疑晦未能盡祛姑據所知寫成定本其諸同異因悉存之以備參訂云空同道士鄒訢按鄒訢二宇朱子借之託名也鄒本春秋邾子之國樂記天地訢合鄭氏註云訢當作熹朱子曰按魏書首言乾坤坎離四卦橐籥之外其次即言屯蒙六十卦以見一日用功之早晩又次即言納甲六卦以見一月用功之進退又次即言十二辟卦以分納甲六卦而兩之蓋内以詳理月節而外以兼統歲功其所取於易以爲說者如是而已初未嘗及夫三百八十四爻也今世所傳火候之法乃以三百八十四爻爲一周天之數以一爻直一日而爻多日少則不免去其四卦二十四爻以俟二十四氣之至而漸加焉已非出於自然脗合之度矣且當日所用之爻或陰或陽初无次第不知功夫有何分别又況一日之間己周三百六十之數而其一氣所加僅得一爻多少重輕不相權準又此二十四者進增微漸退減暴疾无復往來循環之勢恐亦後人以意爲之未必魏君之本指也運意此書大要在於坎離二宇若於此處得其綱領則功夫之節度魏君所不言者自可以意爲之但使不失其早晩之期進退之節便可用功不必一一拘舊說故今推得策數一法似亦齊整其與爻數之法雖皆魏君所不言然此爲粗有理也蓋月以十二卦分之卦得二日有半各以本卦之爻行本卦之策自八月觀卦以後至正月泰卦陽用少二十八策陰用老二十四策自四月大壯以後至七月否卦陽用老三十六策陰用少二十二策陽即注意流行陰即放而冥寂一爻己足即一開辟之氣其休息之十二卦罔即爲一月之功十二月周即爲一歲之運反復循環无有餘欠其數已具圖欲与季通講之未及寓寄而季通死矣按朱子於昔所著書成家者未嘗隨聲附影輕附於聖人之徒如麻衣易以爲戴師愈所作關子明易以爲阮逸僞作其重於傳信如此獨於參同契无一語疑似且其解易得於邵子爲多而其言曰邵子得於希夷希夷源流自參同契是以從上處之也嘗曰眼中見得了了如此但无下手處曰今始識頭緒未得其作料孔穴慶元丁巳蔡季通編置道州將别留宿寒泉相與訂正參同契終夕不寐嗚呼是師是弟子處憂患不亂如此而獨於參同拳拳焉脱屣世俗之意决矣明年季通卒又得所謂策數之法恨不及與季通講之又二年而先生卒矣然則參同陰符二書自其師弟子始而二書不戾於聖人可信故成書以之列太極先天之後豈有二乎哉周易參同契卷下
