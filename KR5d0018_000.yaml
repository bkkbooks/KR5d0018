  text: 周易參同契容一
  hash: sha256:355346bd99af3020fd38db26e2545395807c1c4444306271cc76e3c70e50e436
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0018_HFL_000-001a, image: hfl/0623/0623-004.png}
body:
  text: 廬陵後學黃瑞節附録周易參同契五代彭曉解義序曰魏伯陽會稽上虞人修真潛默養志虛無博贍文詞通諸緯候得古文龍虎經盡獲妙旨乃約周易撰參同契三篇復作補塞遺脫一篇所述多以寓言借事隱顯異文密示青州徐從事徐乃隱名而注之桓帝時公復傳授與同郡淳于叔通遂行於世參雜也同通也契合也謂與周易理通而義合也其書假借君臣以彰內外敘其離坎直指汞鉛列以乾坤奠量鼎器明之父母保以始終合以夫妻拘其交媾譬諸男女顯以滋生析以陰陽導之反復示之晦朔通以降騰配以卦爻形於變化隨之斗柄取以周星分以晨昏昭諸刻漏莫不託易象而論之故名周易參同契云按參同契注本凡一十九部三十一卷其目載夾漈鄭氏藝文略彭曉本最傳然分三卷為九十章以應陽九之數歌鼎器一篇以應水一之數其傅會類如此蓋效河上公分老子為上經下經八十一章而其實非也鮑氏云彭本為近世淺學妄更祕館所藏民間所録差誤衍脫莫知適從朱子考辨正文引證依據其本始定今不敢又贅附諸説云朱子曰參同契本不為明易姑借此納甲之法以寓其行持進退之候異時每欲學之而不得其傳無下手處不敢輕議然其所言納甲之法則今所傳京房占法見於火珠林者是其遺説所云甲乙丙丁庚辛者乃以月之昏旦出沒言之非以分六卦之方也此雖非為明易而設然易中無所不有苟其言自成一家可推而通則亦無害於易伯陽參同契恐希夷之學有些自其源流先天圖與納音相應蔡季通言與參同契合以圖觀之坤復之間為晦震為初三一陽生八日為兊月上弦十五日為乾十八日為巽一陰生二十三日為艮月下弦坎離為日月故不用參同以坎離為藥餘者以為火候邵子發明先天圖圖傳自希夷希夷又自有所傳蓋方士技術用以修鍊參同契所言是也參同契文章極好蓋後漢之能文者為之其用字皆根據古書非今人所能解以故皆為人妄解世間本子極多其中有云千周燦彬彬兮萬變將可覩神明或告人兮魂靈忽自悟言誦之久則文義要訣自見須溪劉氏曰古書惟參同契似先秦文上篇乾坤者易之門户衆卦之父母乾坤以宇內言之則乾天在上坤地在下而陰陽變化萬物終始皆在其間以人身言之則乾陽在上坤陰在下而一身之陰陽萬物變化終始皆在其間此乾坤所以為易之門户衆卦之父母也凡言易者皆指陰陽變化而言在人則所謂金丹大藥者也然則乾坤其爐鼎歟坎離匡郭運轂正軸乾坤位乎上下而坎離升降於其間所謂易也先天之位乾南坤北離東坎西是也故其象如垣郭之形其升降則如車軸之貫轂以運輪一下而一上也轂車輪之心外實而持輻內空以受軸者也軸車下橫木兩頭貫轂而受轄者也牝牡四卦以為橐籥牝牡謂配合之四卦震兊巽艮是也橐鞲囊籥其管也蓋納甲之法乾為望坤為晦而坎離升降於其間震為生明而兊為上弦巽為生魄而艮為下弦如鼓鞲之有緩急也朱子曰邵子云乾坤定上下之位坎離列左右之門參同契首卦位鋪排都只一般覆冒陰陽之道猶工御者執銜轡準繩墨隨軌轍處中以制外數在律歷紀此言人心能統陰陽運轂軸以成丹也銜轡謂所以使陰陽者繩墨謂火候軌轍指其升降之所由中謂心外謂氣數即下文六十卦之火候也月節有五六經緯奉日使兼并為六十剛柔有表裏月以五日為一節六節為一周兼晝夜為六十以配六十卦晝剛夜柔剛裏柔表蓋六十四卦除乾坤坎離為爐竈丹藥所用以為火候者止六十卦也朔旦屯直事至暮蒙當受晝夜各一卦用之如次序此六十卦之凡例一月而一周蓋逐日用功時刻之早晚也既未至晦爽終則復更始日辰為期度動靜有早晚既未謂晦日之卦朝既濟暮未濟也爽謂生明之時春夏據內體從子到辰巳秋冬當外用自午訖戌亥春夏謂朝秋冬謂暮內體謂前卦外用謂後卦此亦六十卦之凡例後篇屯以子申蒙用寅戌乃以納甲之法盡發之大率一日所用子午卯酉四時而已賞罰應春秋昏明順寒暑爻辭有仁義隨時發喜怒如是應四時五行得其序此言朝暮用功有不同之處未詳其説天地設位而易行乎其中矣天地者乾坤也設位者列陰陽配合之位也易謂坎離坎離者乾坤二用此引易而釋之以明乾坤坎離之用言乾上而坤下離降而坎升也乾坤二用謂乾用九坤用六九老陽六老陰也二用無爻位周流行六虛往來既不定上下亦無常幽潛淪匿升降於中包囊萬物為道紀綱以無制有器用者空故推消息坎離沒亡乾坤二卦六爻九六各有定位唯用九用六無定位而六爻之九六即此九六之周流升降也納甲之法乾納甲壬坤納乙癸震納庚巽納辛艮納丙兊納丁皆有定位而坎納戊離納己無定位蓋六卦之陰陽即坎離中爻之周流升降也故以此之無制彼之有知器有形而其用乃在其形之空處蓋用老子所謂埏埴以為器當其無有器之用之語也消息謂自坤之息歷震兊而極於乾自乾而消歷巽艮而極於坤也沒亡謂無位也後章用九翩翩為易宗祖一節亦是此意也朱子曰或問參同本是龍虎上經果否曰不然蓋是後人見伯陽傳有龍虎上經一句遂偽作此經大概皆是櫽括參同之語而為之也其間有説錯了處如二用云者用九用六九六亦坎離也六虛者即乾坤之初二三四五上六爻位也言二用雖無爻位而常周流乎乾坤六爻之間猶人之精氣上下周流乎一身而無定所也龍虎經却錯説作虛危去蓋討頭不見牽合一宇來説按彭氏以為魏公得古文龍虎經而撰參同契朱子以為經乃後人偽作今考參同契中有古文記龍虎之文往往古有其文如火記之類特恐非今所傅者耳鮑氏云此乃三墳書狐首經之比未可知也又按金碧古文龍虎上經差簡於參同契然其語次布置與契不甚相遠而加整焉末云火記不虛作亦契中語也然則火記又參同之所自出與言不苟造論不虛生引驗見效校度神明推類結字原理為徵坎戊月精離己日光日月為易剛柔相當土王四季羅絡始終青赤白黑各居一方皆稟中宫戊己之功此亦造字之法明坎月離日之合而為易也蓋坎戊離己皆居中宫土位而四方四行皆稟其氣易者象也懸象著明莫大乎日月窮神以知化陽往則陰來輻湊而輪轉出入更卷舒此總明日月為易之意下乃詳言其法與一月之火候晦至朔旦震來受符當斯之時天地媾其精日月相撢持雄陽播玄施雌陰化黃包混沌相交接權輿樹根基經營養鄞鄂凝神以成軀衆夫蹈以出蠕動莫不由於是仲尼贊洪濛乾坤德洞虛稽古稱元皇關雎建始初冠婚氣相紐元年乃芽滋聖人不虛生上觀顯天符天符有進退詘信以應時此書之法以一月為六節分屬六卦震一兊二乾三巽四艮五坤六每五日為一節故言朔旦則震始用事而為日月陰陽交感之初於是加修鍊之功如聖人之作六經皆有所托始也此實一篇之要言而雄陽播玄施雌陰化黃包又一節之要處他皆以明此耳故易統天心復卦建始萌長子繼父體因母立兆基消息應鍾律升降據斗樞此又以一月為十二節以復臨泰壯夬乾姤遁否觀剝坤為序每二日半為一節復即前六節震卦之內體也長子震也父乾也母坤也下章云朔旦為復三日出為爽震受庚西方八日兊受丁上弦平如繩十五乾體就盛滿甲東方三日第一節之中月生明之時也蓋始受一陽之光而昏見於西方庚地也八日第二節之中月上弦之時蓋受二陽之光而昏見於南方丁地也十五日第三節之中月既望之時全受日光盛滿而昏見於東方之甲地也蟾蜍與兔魄日月氣雙明蟾蜍視卦節兔者吐生光此言望夕之月全受日光而借蟾為瞻借兔為吐也七八道己訖屈折低下降十六轉受統巽辛見平明艮直於丙南下弦二十三坤乙三十日東北喪其明節盡相禪與繼體復生龍壬癸配甲乙乾坤括始終七八謂十五日也十六日謂第四節之始也始生下一陰為巽而成魄以平旦而沒於西方辛地也二十三日第五節之中復生中一陰為艮而下弦以平旦而沒於南方丙地也三十日第六節之終全變三陽而光盡體伏於東北借易朋字作明字也一月六節既盡而襌於後月長子繼父復生震卦壬配甲癸配乙皆屬乾坤括十日之始終自晦至朔旦至此一月之火候也朱子曰一息之間便有晦朔弦望上弦者氣之方息自上而下也下弦者氣之方消自下而上也望者氣之盈也日沈于下而月圓于上也晦朔之間日月之合乎上所謂舉水以滅火金來歸性初之類是也七八數十五九六亦相應四者合三十陽氣索滅藏索盡也八卦列布曜運移不失中玄精眇難覿推度效符證居則觀其象準擬其形容立表以為範占候定吉凶發號順時令勿失爻動時上察河圖文下序地形流中稽於人情參同考三才動則循卦節靜則因彖辭乾坤用施行天下然後治此用乾坤用九天下治也之語上言乾坤用即用九用六也治或作理蓋避唐諱此下至國無害道皆以國政為喻可不愼乎御政之首管括密微闓舒布寶要道魁柄統化綱紐爻象內動吉凶外起五緯錯順應時感動四七乖戾侈離俯仰文昌總録詰責台輔百官有司各典所部日合五行精月受六律紀五六三十度度竟復更始原始要終存亡之緒或君驕佚亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法剌譏結過移主辰極受正優遊任下明堂布政國無害道此皆取譬之言然其間亦有可詳味者內以養己安靜虛無元本隱明內照形軀閉塞其兊築固靈株三光陸沈溫養子珠視之不見近而易求黃中漸通理潤澤達肌膚初正則終修幹立末可持一者以掩蔽世人莫知之此乃以內事言之於經中最為要切而三光陸沈溫養子珠之一言又要切之要切者前所譬御政之首魁柄綱紐正謂此也初正幹立原始而言也終修末持要終而言也一者以掩蔽言其造端之處隱而不章者也上德無為不以察求下德為之其用不休上閉則稱有下閉則稱無無者以奉上上有神德居此兩孔穴法金氣亦相胥此下漸難通曉今略以意解之上德即上文所謂雌陰化黃包三光陸沈下文所謂汞白為流珠青龍與之俱所謂流珠水之母者正思慮所不及也下德即上文所謂雄陽播玄施溫養子珠下文所謂白虎為熬樞黃土金之父者正著意用力處也閉則皆失其所宜矣下不可無故無者以奉上神德謂微妙處龍虎經作上有青龍居金氣即謂雄陽白虎也大率陽既下即陰自上矣所謂孔穴者此也鼎器歌云陰在上陽下奔此亦至要之言知白守黑神明自來白者金精黑者水基水者道樞其數各一白謂汞黑謂鉛金精言其生於鉛水基能生水也白黑各一而水為道樞所謂神德者也陰陽之始玄含黃芽五金之主北方河車玄含黃芽水中有土靜而有意也北方河車黑而生水也以下文考之正謂鉛耳故鉛外黑內懷金華被褐懷玉外為狂夫鉛即上文所謂金氣金為水母母隱子胎水者金子子藏母胞此即上文知白守黑之義真人至妙若有若無倣佛大淵乍沈乍浮退而分布各守境隅此所謂溫養子珠者也望之類白造之則朱鍊為表衛白裏貞居方圓徑寸混而相拘先天地生巍巍尊高旁有垣闕狀似蓬壺環匝關閉四通踟蹰守禦密固閼絶姦邪曲閣相通以戒不虞徑寸即所謂子珠者垣闕疑即下文所謂情主營外垣為城郭者耶皆未詳其何説可以無思難以愁勞神氣滿堂莫之能留守之者昌失之者亡動靜休息常與人俱是非歷藏法內視有所思履行步斗宿六甲以日辰陰道厭九一濁亂弄玄胞食氣鳴腸胃吐正吸新邪晝夜不卧寐腸鳴未嘗休身體以疲倦恍惚狀若癡百脈鼎沸馳不得清澄居周回立壇宇朝暮敬祭祠鬼物見形象夢寐感慨之心歡意喜悅自謂必延期遽以夭命死腐露其形骸舉措輒有違悖逆失樞機諸術甚衆多千條有萬餘前却違黃老曲折戾九都言此道與諸旁門小法之不同不能詳解明者省厥旨曠然知所由勤而行之夙夜不休服食三載輕舉遠遊入火不焦入水不濡能存能亡長樂無憂道成德就潛伏俟時太一乃召移居中洲功滿上升應籙受圖火記不虛作演易以明之偃月法鼎爐白虎為熬樞汞日為流珠青龍與之俱舉東以合西魂魄自相拘上弦兊數八下弦亦如之偃月疑前下圓後上缺狀如偃月也白虎鉛也火也氣也西也魄也陽也為熬樞言下奔而致蒸潤上行也汞日精也青龍水也東也魂也陰也上弦陽也下弦陰也朱子曰坎離水火龍虎鉛汞之屬只是互換其名其實只是精氣二者而已精水也坎也龍也汞也氣火也離也虎也鉛也其法以神運精氣結而為丹陽氣在下初成水以火鍊之則凝成丹其説甚異兩弦合其精乾坤體乃成二八應一斤易道正不傾八日為兊上弦又進八日乃成乾體二十三日為艮下弦又退八日乃成坤體一本注云銖有三百八十四亦應爻之數蓋一斤之銖數也自震而起至乾而滿歷巽而消至坤而盡金入於猛火色不奪精光自開闢以來日月不虧明金不失其重日月形如常金本從月生朔旦受日符金反歸其母月晦日相包隱藏其匡郭沈淪於洞虛金復其故性威光鼎乃熺金即鉛也金歸其母復其故性謂斂藏不用日不照月純坤卦也熺字本作喜一本作僖今按皆無理案説文熺炎也後漢多用此字子午數合三戊己號稱五三五既和諧八石正綱紀呼吸相貪欲佇思為夫婦黃土金之父流珠水之母水以土為鬼土填水不起朱雀為火精執平調勝負水勝火消滅俱死歸厚土三性既合會本性共宗祖子水一午火二數合三也戊己土其數五三五合而為八八石象也然其實但水火二物而以土為主耳土屬脾脾主意謂以意使火下而水上相呼吸也金即火也朱雀疑指心而言又意之主也此火字與前章熬字意不同别是一火也執平謂執衡司夏也此晝之意大抵為以火烹水以水滅火亦如前章月受日光反歸其母之意也巨勝尚延年還丹可入口金性不敗朽故為萬物寶術士服食之壽命得長久土遊於四季守界定規矩金砂入五內霧散若風雨薰蒸達四肢顔色悅澤好髮白更生黑齒落出舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰真人此言內丹而言入口未詳其旨餘見後章馳入赤色門下胡粉投火中色壞還為鉛冰雪得溫湯解釋成太玄金以砂為主稟和於水銀變化由其真終始自相因此皆以同類相變為譬也欲作服食仙宜以同類者植禾當以粟覆雞用其子以類輔自然物成易陶冶魚目豈為珠蓬蒿不成檟類同者相從事乖不成寶是以燕雀不生鳳狐兔不乳馬水流不炎上火動不潤下又以異類不能相成反覆明之世間多學士高妙負良才邂逅不遭值耗火亡貨財據按依文説妄以意為之端緒無因緣度量失操持搗治羌石膽雲母及礜磁硫黃燒豫章泥汞相鍊治鼓下五石銅以之為輔樞雜性不同種安肯合體居千舉必萬敗欲黠反成癡稚年至白首中道生狐疑背道守迷路出正入邪蹊管窺不廣見難以揆方來此言為外丹者藥非同類不能成寶若夫至聖不過伏羲畫八卦效天圖文王帝之宗結體演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更御時優劣有步驟功德不相殊制作有所踵推度審分銖有形易忖量無兆難慮謀作事令可法為世定詩書素無前識資因師覺悟之皓若褰帷帳瞋目登高臺言三聖迭興事有優劣蓋伏羲法天文王踵羲夫子踵文有形者易制無形者難及也因自言因師以悟此理也詩書兩句未詳火記六百篇所趣等不殊文字鄭重説世人不熟思尋度其原流幽明本共居竊待賢者談曷敢輕為書結舌欲不語絶道獲罪誅寫情寄竹帛恐泄天之符猶豫增歎息俯仰綴斯愚陶冶有法度未忍悉陳敷略述其紀綱枝條見扶疏火記六百篇蓋古書今亡未可知以金為隄防水火乃優遊金數十有五水數亦如之臨爐定銖兩五分水有餘二者以為真金重如本初其三遂不入火二與之俱二物相含受變化狀若神下有太陽氣伏蒸須臾間先液而後凝號曰黃輿焉此言丹之第一變也金水並見上入一作火據下文三物即當作火然又云下有太陽氣則似只是二物恐當作八而三亦當作二耳此是金水數皆十五而五分其水只用其二蓋十五之六也其三則十五之九也水二一作火二與上水火下三物相應但上無火之銖兩下又有太陽字則又未必然也二物相含受即陰陽坎離之交三物之誤甚明歲月將欲訖毁性傷壽年形體為灰土狀若明窗塵此似第二變也搗治并合之馳入赤色門固塞其際會務令致完堅炎火張於下晝夜聲正勤始文使可修終竟武乃陳候視加謹愼審察調寒溫周旋十二節節盡更親觀氣索命將絶休死亡魄魂色轉更為紫赫然成還丹粉提以一丸刀圭最為神此第三變也搗治并合此當别有所作用赤色門謂口也液凝灰土理須自見蓋吐出而鍊治之復吞納也炎火即所謂太陽氣聲正勤後章亦言嗷嗷聲正悲如嬰兒慕母是也修疑作修字唐人兩字多互見氣索命絶又是前章火滅金復之意粉提刀圭未詳推演五行數較約而不煩舉水以激火奄然滅光榮日月相激薄常存晦朔間水盛坎侵陽火衰離晝昏陰陽相飲食交感道自然名者以定情宇者緣性言金來歸性初乃得稱還丹此解上文還丹得名之義因火滅而金復也吾不敢虛説放效聖人文古記題龍虎黃帝美金華淮南鍊秋石王陽加黃芽賢者能持行不肖母與俱古今道由一對談吐所謀學者加勉力留念深思惟至要言甚露昭昭不我欺周易參同契
